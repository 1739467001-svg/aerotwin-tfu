<script>
/* ============================================================
   AEROTWIN web · 渲染 / UI 层（three.js）
   仿真内核已抽离至 sim.js（浏览器/Node 通用、纯逻辑零依赖），此处取出其 API；
   内核单元测试见 test/sim.test.js（npm test）
   ============================================================ */
const {
  RWY, GATE_COUNT, gateX, GATE_Z, IN_TAXI_Z, OUT_TAXI_Z,
  PHASE_LABEL, PHASE_COLOR, createSim, stepSim, snapshotKpi, log,
} = AeroSim;

/* ============================================================
   渲染层（three.js）
   ============================================================ */
/* 共享几何 / 材质：所有飞机同款，~40 架共用一套（省内存、降 GC；逐机差异仅选择环） */
const PLANE = {
  geo: {
    fus: new THREE.CylinderGeometry(.95, .85, 8.5, 12), nose: new THREE.ConeGeometry(.93, 2.2, 12),
    wing: new THREE.BoxGeometry(2.6, .22, 11), tailH: new THREE.BoxGeometry(1.6, .18, 4.2), fin: new THREE.BoxGeometry(1.7, 2.3, .22),
    pylon: new THREE.BoxGeometry(1.0, .5, .2), engine: new THREE.CylinderGeometry(.55, .5, 2.6, 12), inlet: new THREE.CircleGeometry(.42, 14),
    windscreen: new THREE.BoxGeometry(.7, .5, 1.0), cabin: new THREE.BoxGeometry(5.4, .34, .05),
    dot: new THREE.SphereGeometry(.26, 8, 8), dotS: new THREE.SphereGeometry(.2, 6, 6), trail: new THREE.PlaneGeometry(1, 1),
  },
  mat: {
    body: new THREE.MeshStandardMaterial({ color: 0xd8dfeb, roughness: .45, metalness: .4 }),
    acc: new THREE.MeshStandardMaterial({ color: 0xff5347, roughness: .4, metalness: .3, emissive: 0xff5347, emissiveIntensity: .25 }),
    engine: new THREE.MeshStandardMaterial({ color: 0xb7bfce, roughness: .5, metalness: .55 }),
    inlet: new THREE.MeshBasicMaterial({ color: 0x10151f }),
    window: new THREE.MeshStandardMaterial({ color: 0x223044, roughness: .3, metalness: .2, emissive: 0xffe7b0, emissiveIntensity: .55 }),
    glass: new THREE.MeshStandardMaterial({ color: 0x0a0f18, roughness: .15, metalness: .6, emissive: 0x9fd8ff, emissiveIntensity: .2 }),
    navR: new THREE.MeshBasicMaterial({ color: 0xff2b2b }), navG: new THREE.MeshBasicMaterial({ color: 0x2bff6a }),
    navW: new THREE.MeshBasicMaterial({ color: 0xfff4e0 }), strobe: new THREE.MeshBasicMaterial({ color: 0xffffff }),
    landing: new THREE.MeshBasicMaterial({ color: 0xfff6e0 }), beacon: new THREE.MeshBasicMaterial({ color: 0xff3b30 }),
    trail: new THREE.MeshBasicMaterial({ map: softGlowTexture(), color: 0xdfeaff, transparent: true, opacity: .5, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide }),
  },
};
function buildPlaneMesh() {
  const G = PLANE.geo, Mt = PLANE.mat, g = new THREE.Group();
  const add = (geo, mat, x, y, z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x, y, z); g.add(m); return m; };
  add(G.fus, Mt.body, 0, 0, 0).rotation.z = -Math.PI / 2;
  add(G.nose, Mt.body, 5.3, 0, 0).rotation.z = -Math.PI / 2;
  add(G.wing, Mt.body, .2, -.2, 0); add(G.tailH, Mt.body, -4.1, .4, 0); add(G.fin, Mt.acc, -4.2, 1.4, 0);
  for (const z of [-3.0, 3.0]) {                 // 翼下双发 + 暗色进气口
    add(G.pylon, Mt.body, .7, -.5, z);
    add(G.engine, Mt.engine, 1.0, -.95, z).rotation.z = -Math.PI / 2;
    add(G.inlet, Mt.inlet, 2.32, -.95, z).rotation.y = Math.PI / 2;
  }
  add(G.windscreen, Mt.glass, 4.2, .55, 0);      // 驾驶舱风挡
  add(G.cabin, Mt.window, -.2, .35, -.96); add(G.cabin, Mt.window, -.2, .35, .96);   // 两侧客舱舷窗带
  add(G.dotS, Mt.navR, .2, -.1, -5.5); add(G.dotS, Mt.navG, .2, -.1, 5.5); add(G.dotS, Mt.navW, -5.2, .3, 0);  // 航行灯 左红/右绿/尾白（常亮）
  const bT = add(G.dot, Mt.beacon, 0, 1.1, 0), bB = add(G.dotS, Mt.beacon, 0, -1.0, 0);                        // 防撞信标 机背/机腹
  const stL = add(G.dotS, Mt.strobe, .2, -.1, -5.7), stR = add(G.dotS, Mt.strobe, .2, -.1, 5.7);               // 白色频闪 翼尖
  stL.visible = stR.visible = false;
  const land = add(G.dot, Mt.landing, 2.0, -.8, 0); land.visible = false;                                      // 起降灯 前向白光
  const trail = new THREE.Group();               // 起飞尾流：交叉双面软光带，仅爬升显现
  for (let i = 0; i < 2; i++) {
    const tp = new THREE.Mesh(G.trail, Mt.trail); tp.scale.set(9, 1.7, 1); tp.position.x = -4.5;
    if (i) tp.rotation.x = Math.PI / 2; trail.add(tp);
  }
  trail.position.set(-5.0, -.15, 0); trail.visible = false; g.add(trail);
  const ring = new THREE.Mesh(new THREE.RingGeometry(6.5, 7.6, 32),     // 选择环：逐机独立材质，脉冲不影响他机
    new THREE.MeshBasicMaterial({ color: 0xff5347, transparent: true, opacity: 0, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.y = -.4; g.add(ring);
  g.traverse((o) => { if (o.isMesh && o.material.isMeshStandardMaterial) o.castShadow = true; });
  g.scale.setScalar(1.15);
  g.userData.fx = { bT, bB, stL, stR, land, trail, ring };
  return g;
}

/* 细腻噪点纹理：让大地有草地质感（颜色由主题着色） */
function groundTexture() {
  const cv = document.createElement("canvas"); cv.width = cv.height = 256;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#e8e8e8"; ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 7000; i++) {
    const v = 195 + Math.floor(Math.random() * 60);
    ctx.fillStyle = "rgb(" + v + "," + v + "," + v + ")";
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(36, 24);
  return tex;
}

/* 太阳神鸟金饰：金沙遗址出土，成都市标 / 天府机场文化图腾
   —— 中心 12 道旋转齿芒（太阳），外圈 4 只逆时针环飞神鸟 */
function drawSunBird(ctx, gold) {
  // 中心太阳：12 道旋转火芒
  const r1 = 60, r2 = 116;
  ctx.fillStyle = gold;
  for (let i = 0; i < 12; i++) {
    ctx.save();
    ctx.rotate((i / 12) * Math.PI * 2);
    ctx.beginPath();
    ctx.moveTo(-12, -r1);
    ctx.quadraticCurveTo(10, -(r1 + r2) / 2, 14, -r2);
    ctx.quadraticCurveTo(0, -(r1 + r2) / 2, 12, -r1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0, 0, r1 - 4, 0, Math.PI * 2); ctx.fill();
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath(); ctx.arc(0, 0, r1 - 26, 0, Math.PI * 2); ctx.fill();
  ctx.globalCompositeOperation = "source-over";
  // 外圈 4 只神鸟
  const rb = 168;
  for (let i = 0; i < 4; i++) {
    ctx.save();
    ctx.rotate((i / 4) * Math.PI * 2 + 0.35);
    ctx.translate(0, -rb);
    ctx.scale(0.82, 0.82);
    ctx.beginPath();
    ctx.moveTo(-60, 8);
    ctx.quadraticCurveTo(-18, -16, 32, -12);
    ctx.quadraticCurveTo(62, -10, 80, -28);
    ctx.quadraticCurveTo(88, -36, 96, -30);
    ctx.lineTo(106, -33);
    ctx.quadraticCurveTo(92, -22, 80, -16);
    ctx.quadraticCurveTo(58, 0, 28, 4);
    ctx.quadraticCurveTo(-12, 10, -42, 18);
    ctx.lineTo(-60, 28);
    ctx.quadraticCurveTo(-54, 14, -60, 8);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();      // 上扬的翅膀
    ctx.moveTo(-6, -8);
    ctx.quadraticCurveTo(-30, -52, -66, -56);
    ctx.quadraticCurveTo(-30, -28, -18, -2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}
function sunBirdTexture() {
  const S = 512, cv = document.createElement("canvas"); cv.width = cv.height = S;
  const ctx = cv.getContext("2d");
  ctx.translate(S / 2, S / 2);
  drawSunBird(ctx, "#ecc04e");
  return new THREE.CanvasTexture(cv);
}

/* 天府航站楼群：T1/T2 呈「神鸟展翅」V 形对称展开，
   中央 GTC 圆厅屋顶铺太阳神鸟金饰（与实景一致），塔台立于中轴 */
/* 玻璃幕墙：菲涅尔天空反射着色器 —— 掠射角映射天穹渐变（随昼夜/雷暴自动变），
   正视显玻璃本色；零渲染开销，靠共享 sky 颜色对象自动跟随，无需逐帧更新 uniform。 */
const CURTAIN_VERT =                       // cameraPosition 仅 three 顶点阶段内置 → 此处算视向并透传
  "varying vec3 vWN; varying vec3 vView;" +
  "void main(){ vec4 wp = modelMatrix * vec4(position,1.0);" +
  " vView = cameraPosition - wp.xyz; vWN = normalize(mat3(modelMatrix) * normal);" +
  " gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }";
const CURTAIN_FRAG =
  "uniform vec3 skyTop; uniform vec3 skyHor; uniform vec3 base; uniform float reflectivity; uniform float fpow;" +
  "varying vec3 vWN; varying vec3 vView;" +
  "void main(){ vec3 V = normalize(vView); vec3 N = normalize(vWN);" +
  " float fres = pow(1.0 - max(dot(N, V), 0.0), fpow);" +
  " vec3 R = reflect(-V, N); float up = clamp(R.y * 0.5 + 0.5, 0.0, 1.0);" +
  " vec3 sky = mix(skyHor, skyTop, up);" +
  " float refl = clamp(mix(0.18, 1.0, fres) * reflectivity, 0.0, 1.0);" +
  " gl_FragColor = vec4(mix(base, sky, refl), 1.0); }";
function makeCurtain(base) {
  return new THREE.ShaderMaterial({
    uniforms: {
      skyTop: { value: new THREE.Color(0x3d8fd6) }, skyHor: { value: new THREE.Color(0xcfe9fb) },
      base: { value: new THREE.Color(base) }, reflectivity: { value: 0.85 }, fpow: { value: 3.0 },
    },
    vertexShader: CURTAIN_VERT, fragmentShader: CURTAIN_FRAG,
  });
}

function buildTerminal(scene, M, birdTex) {
  const wing = (sign) => {
    const g = new THREE.Group();
    g.position.set(sign * 10, 0, 6);
    g.rotation.y = -sign * .11;   // 两翼向陆侧后掠，形成 V 形
    const body = new THREE.Mesh(new THREE.BoxGeometry(150, 7, 16), M.terminal);
    body.position.set(sign * 75, 3.5, 4); g.add(body);
    const glow = new THREE.Mesh(new THREE.BoxGeometry(148, 2.4, .6), M.curtain);
    glow.position.set(sign * 75, 4.2, -4); g.add(glow);
    // 波浪屋顶：翼根高、翼梢低，叠正弦起伏
    for (let x = 4; x <= 146; x += 7.9) {
      const y = 7.2 + 2.2 * Math.cos(((x - 4) / 142) * 1.25) + .4 * Math.sin(x * .12);
      const rib = new THREE.Mesh(new THREE.BoxGeometry(7.5, 1.1, 24), M.terminal);
      rib.position.set(sign * x, y, 4); g.add(rib);
    }
    scene.add(g);
  };
  wing(1); wing(-1);
  // GTC 圆厅 + 屋顶太阳神鸟
  const gtc = new THREE.Mesh(new THREE.CylinderGeometry(21, 22, 8, 36), M.terminal);
  gtc.position.set(0, 4, 26); scene.add(gtc);
  const gtcGlass = new THREE.Mesh(new THREE.CylinderGeometry(21.3, 21.3, 2, 36), M.curtain);
  gtcGlass.position.set(0, 3, 26); scene.add(gtcGlass);
  const emblem = new THREE.Mesh(new THREE.CircleGeometry(18.5, 48),
    new THREE.MeshBasicMaterial({ map: birdTex, transparent: true }));
  emblem.rotation.x = -Math.PI / 2; emblem.position.set(0, 8.15, 26); scene.add(emblem);
}

function buildAirport(scene) {
  const mk = (color, extra) => new THREE.MeshStandardMaterial(Object.assign({ color, roughness: .95 }, extra));
  /* 昼夜共享材质（applyDaylight 按时刻统一插值改色） */
  const M = {
    ground: mk(0x0a0f1c, { map: groundTexture() }), runway: mk(0x182032), taxi: mk(0x121a2c),
    apron: mk(0x0e1526), pad: mk(0x101a30), road: mk(0x131c2f),
    dash: new THREE.MeshBasicMaterial({ color: 0x6b7892 }),
    ring: new THREE.MeshBasicMaterial({ color: 0x24314f, side: THREE.DoubleSide }),
    terminal: mk(0x121b30, { roughness: .6, metalness: .2 }),
    tower: mk(0x1a2440, { roughness: .5 }),
    cab: mk(0x223155, { roughness: .95, emissive: 0x16335e, emissiveIntensity: .7 }),
    curtain: makeCurtain(0x2a4673),   // GTC 圆厅 + 两翼玻璃幕墙（菲涅尔天空反射）
  };
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(2200, 1400), M.ground);
  ground.rotation.x = -Math.PI / 2; ground.position.y = -.1; scene.add(ground);
  /* 草坪修剪条纹（机场草地常见的明暗相间带） */
  const stripeMat = new THREE.MeshBasicMaterial({ color: 0x0a1606, transparent: true, opacity: .08 });
  for (const [z0, z1] of [[-96, -127], [-158, -290], [150, 30]]) {
    for (let z = z0; z > z1; z -= 14) {

/* ------- 天空：渐变穹顶 / 太阳月亮光晕 / 柔和云层 ------- */
function softGlowTexture() {
  const cv = document.createElement("canvas"); cv.width = cv.height = 128;
  const ctx = cv.getContext("2d");
  const g = ctx.createRadialGradient(64, 64, 6, 64, 64, 62);
  g.addColorStop(0, "rgba(255,255,255,.95)");
  g.addColorStop(.5, "rgba(255,255,255,.5)");
  g.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(cv);
}
function buildSky(scene) {
  /* 天顶→地平线双色渐变穹顶 */
  const skyU = {
    topColor: { value: new THREE.Color(0x3d8fd6) },
    bottomColor: { value: new THREE.Color(0xcfe9fb) },
    offset: { value: 20 }, exponent: { value: .65 },
  };
  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(1500, 24, 12),
    new THREE.ShaderMaterial({
      uniforms: skyU, side: THREE.BackSide, depthWrite: false, fog: false,
      vertexShader: "varying vec3 vWorldPosition; void main(){ vec4 wp=modelMatrix*vec4(position,1.); vWorldPosition=wp.xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }",
      fragmentShader: "uniform vec3 topColor; uniform vec3 bottomColor; uniform float offset; uniform float exponent; varying vec3 vWorldPosition; void main(){ float h=normalize(vWorldPosition+vec3(0.,offset,0.)).y; gl_FragColor=vec4(mix(bottomColor,topColor,pow(max(h,0.),exponent)),1.); }",
    })
  );
  dome.renderOrder = -1; scene.add(dome);

  const puff = softGlowTexture();
  const cloudMat = new THREE.SpriteMaterial({ map: puff, transparent: true, depthWrite: false, opacity: .85 });
  const clouds = new THREE.Group();
  for (let i = 0; i < 10; i++) {
    const c = new THREE.Group();
    const n = 5 + Math.floor(Math.random() * 4);
    for (let j = 0; j < n; j++) {
      const s = new THREE.Sprite(cloudMat);
      const sc = 22 + Math.random() * 26;
      s.scale.set(sc * (1.3 + Math.random() * .6), sc, 1);
      s.position.set((j - n / 2) * 14 + (Math.random() - .5) * 8, (Math.random() - .4) * 7, (Math.random() - .5) * 14);
      c.add(s);
    }
    c.position.set(-560 + Math.random() * 1120, 140 + Math.random() * 90, -500 + Math.random() * 620);
    c.userData.vx = 1 + Math.random() * 1.8;
    clouds.add(c);
  }
  scene.add(clouds);

  const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: puff, color: 0xffe2a0, transparent: true, depthWrite: false, opacity: .9 }));
  sunGlow.scale.set(190, 190, 1); sunGlow.position.set(340, 290, -560); scene.add(sunGlow);
  const sunBall = new THREE.Mesh(new THREE.SphereGeometry(17, 16, 16), new THREE.MeshBasicMaterial({ color: 0xfff6d8, fog: false }));
  sunBall.position.copy(sunGlow.position); scene.add(sunBall);

  const moonGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: puff, color: 0xbcd0f0, transparent: true, depthWrite: false, opacity: .35 }));
  moonGlow.scale.set(80, 80, 1); moonGlow.position.set(-320, 270, -540); scene.add(moonGlow);
  const moon = new THREE.Mesh(new THREE.SphereGeometry(13, 16, 16), new THREE.MeshBasicMaterial({ color: 0xe6edf9, fog: false }));
  moon.position.copy(moonGlow.position); scene.add(moon);

  return { skyU, clouds, cloudMat, sunBall, sunGlow, moon, moonGlow };
}

/* ------- 雷暴天气：雨幕（联动「⛈ 雷暴关闭 02R」按钮）------- */
function buildStorm(scene) {
  const N = 2600, RX = 360, RZ = 360, TOP = 230;
  const pos = new Float32Array(N * 6), drops = [];
  for (let i = 0; i < N; i++) {
    const x = (Math.random() * 2 - 1) * RX, z = (Math.random() * 2 - 1) * RZ;
    const y = Math.random() * TOP, len = 3 + Math.random() * 3, o = i * 6;
    pos[o] = x; pos[o + 1] = y; pos[o + 2] = z;
    pos[o + 3] = x + 0.7; pos[o + 4] = y + len; pos[o + 5] = z;   // 顶端略偏 → 风斜雨丝
    drops.push({ o, speed: 95 + Math.random() * 70, len });
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  const rain = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0xaec6ea, transparent: true, opacity: 0, depthWrite: false }));
  rain.position.set(0, 0, -60); rain.frustumCulled = false; rain.visible = false; scene.add(rain);
  return { rain, drops, TOP };
}

/* ------- 世界空间凝结尾迹：环形池化的消散气团（脱离飞机、留在空中渐隐扩散）------- */
function buildContrails(scene) {
  const tex = softGlowTexture(), N = 140, pool = [];
  for (let i = 0; i < N; i++) {
    const mat = new THREE.SpriteMaterial({ map: tex, color: 0xeef4ff, transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending });
    const sp = new THREE.Sprite(mat); sp.visible = false; scene.add(sp);
    pool.push({ sp, mat, life: 0, max: 1, base: 1 });
  }
  let idx = 0;
  return {
    spawn(x, y, z) {                 // 环形覆盖：超过 N 个则自然顶替最旧
      const p = pool[idx]; idx = (idx + 1) % N;
      p.sp.position.set(x, y, z); p.sp.visible = true;
      p.life = p.max = 2.6; p.base = 2.6 + Math.random() * 1.4;
      p.sp.scale.setScalar(p.base);
    },
    update(dt) {
      for (const p of pool) {
        if (p.life <= 0) continue;
        p.life -= dt;
        if (p.life <= 0) { p.sp.visible = false; p.mat.opacity = 0; continue; }
        const t = p.life / p.max;                    // 1→0
        p.mat.opacity = 0.45 * t;                    // 渐隐
        p.sp.scale.setScalar(p.base * (1 + (1 - t) * 2.0));  // 渐扩散
        p.sp.position.y += dt * 1.4;                 // 随热气缓缓上飘
      }
    },
  };
}

/* ------- 远景树丛（土地点缀） ------- */
function buildTrees(scene, M) {

  const trunkGeo = new THREE.CylinderGeometry(.5, .7, 4, 6);

  for (const [cx, cz] of clusters) {

      const trunk = new THREE.Mesh(trunkGeo, trunkMat); trunk.position.y = 2; t.add(trunk);
      const leaf = new THREE.Mesh(leafGeo, leafMat); leaf.position.y = 8; t.add(leaf);
      t.scale.setScalar(.7 + Math.random() * .8);
      t.position.set(cx + (Math.random() - .5) * 60, 0, cz + (Math.random() - .5) * 40);

    }

}

/* ------- 接驳车：沿航站楼前道路双向往返 ------- */
function buildBuses(scene) {
  const buses = [];
  const colors = [0x35b56a, 0x3f8fe0, 0xf2a93b, 0xe05a4e];
  const winMat = new THREE.MeshStandardMaterial({ color: 0x9fd8ff, roughness: .25, metalness: .4 });
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: .9 });
  const wheelGeo = new THREE.CylinderGeometry(.45, .45, .4, 8);
  for (let i = 0; i < 4; i++) {
    const b = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(7, 2.1, 2.4),
      new THREE.MeshStandardMaterial({ color: colors[i], roughness: .5 }));
    body.position.y = 1.35; b.add(body);
    const win = new THREE.Mesh(new THREE.BoxGeometry(6.2, .8, 2.45), winMat);
    win.position.y = 1.9; b.add(win);
    for (const [wx, wz] of [[-2.4,1.1],[2.4,1.1],[-2.4,-1.1],[2.4,-1.1]]) {
      const w = new THREE.Mesh(wheelGeo, wheelMat);
      w.rotation.x = Math.PI / 2; w.position.set(wx, .45, wz); b.add(w);
    }
    const dir = i % 2 ? -1 : 1;
    b.userData = { x: -160 + i * 85, dir, speed: 9 + Math.random() * 5, z: dir > 0 ? -2 : -.4 };
    scene.add(b); buses.push(b);
  }
  return buses;
}

/* ------- 行人：航站楼前步道上来回走动 ------- */
function buildPeople(scene) {
  const people = [];
  const headMat = new THREE.MeshStandardMaterial({ color: 0xe8c39e, roughness: .8 });
  const colors = [0xe05a4e, 0x4e8fe0, 0x4ec07c, 0xe0b94e, 0x9a6fe0, 0xd8dfeb];
  const bodyGeo = new THREE.CylinderGeometry(.26, .34, 1.05, 6);
  const headGeo = new THREE.SphereGeometry(.23, 6, 6);
  for (let i = 0; i < 36; i++) {
    const p = new THREE.Group();
    const body = new THREE.Mesh(bodyGeo,
      new THREE.MeshStandardMaterial({ color: colors[i % colors.length], roughness: .85 }));
    body.position.y = .55; p.add(body);
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.3; p.add(head);
    p.userData = {
      ax: -155 + Math.random() * 310, az: .7 + Math.random() * 1.4,
      amp: 4 + Math.random() * 9, speed: .25 + Math.random() * .4, phase: Math.random() * Math.PI * 2,
    };
    scene.add(p); people.push(p);
  }
  return people;
}

function applyCam() {
  camera.position.set(
    cam.target.x + cam.r * Math.sin(cam.phi) * Math.sin(cam.theta),
    cam.target.y + cam.r * Math.cos(cam.phi),
    cam.target.z + cam.r * Math.sin(cam.phi) * Math.cos(cam.theta)
  );
  camera.lookAt(cam.target);
}

const VIEWS = {
  overview: { theta: .12, phi: .78, r: 380, target: [-10, 0, -55] },   // 总览
  tower:    { theta: -.30, phi: .72, r: 170, target: [0, 6, -40] },     // 塔台俯瞰航站区
  approach: { theta: -1.60, phi: 1.40, r: 140, target: [-150, 4, -110] }, // 02R 进近端贴地望接地
  top:      { theta: .12, phi: .05, r: 560, target: [0, 0, -60] },      // 正俯视
};
let follow = false, viewName = "overview";
function goView(name) {
  const v = VIEWS[name]; if (!v) return;
  follow = false; viewName = name;
  camGoal.theta = v.theta; camGoal.phi = v.phi; camGoal.r = v.r;
  camGoal.target.set(v.target[0], v.target[1], v.target[2]);
  syncCamButtons();
}
function updateCamera(dt) {       // 每帧把 cam 平滑逼近 camGoal（指数平滑，~1s 过渡）
  if (follow) {
    const pf = sims[renderedView].flights.find((x) => x.id === selectedId && x.phase !== "departed");
    if (pf) camGoal.target.set(pf.pos.x, pf.pos.y + 4, pf.pos.z);
    else { follow = false; syncCamButtons(); }
  }
  const k = Math.min(1, dt * 3);
  let dth = camGoal.theta - cam.theta;
  while (dth > Math.PI) dth -= Math.PI * 2;
  while (dth < -Math.PI) dth += Math.PI * 2;
  cam.theta += dth * k;
  cam.phi += (camGoal.phi - cam.phi) * k;
  cam.r += (camGoal.r - cam.r) * k;
  cam.target.lerp(camGoal.target, k);
  applyCam();
}

let dragging = false, movedDist = 0, px = 0, py = 0;

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const dx = e.clientX - px, dy = e.clientY - py;
  movedDist += Math.abs(dx) + Math.abs(dy);
  px = e.clientX; py = e.clientY;
  cam.theta -= dx * .005;
  cam.phi = Math.max(.18, Math.min(1.42, cam.phi - dy * .004));
  camGoal.theta = cam.theta; camGoal.phi = cam.phi;   // 拖拽即取消预设过渡的转动；跟随时仍绕机环绕
  applyCam();
});
window.addEventListener("mouseup", () => { dragging = false; });

  e.preventDefault();
  cam.r = Math.max(90, Math.min(950, cam.r * (1 + e.deltaY * .001)));
  camGoal.r = cam.r;
  applyCam();
}, { passive: false });

  );

/* ------- 昼夜循环：太阳随时钟划过天空（大气散射式渐变）-------
   按"当日时刻"连续插值 天空/雾/光照/材质，并把平行光与可见太阳放到真实日位上，
   使阴影方向随太阳走；月亮与星空按太阳落山程度渐入。沿用上方 day/night 调色板做材质端点。 */
const clamp = (x, a, b) => Math.min(b, Math.max(a, x));
const smoothstep = (e0, e1, x) => { const t = clamp((x - e0) / ((e1 - e0) || 1e-6), 0, 1); return t * t * (3 - 2 * t); };

const SUN_R = 600, SUN_VIS_R = 700, MOON_VIS_R = 700;   // 平行光 / 可见日 / 可见月 距离
/* 天空关键帧（按当日小时；首尾同色实现 0↔24 衔接）。day=材质日夜插值量（0 夜 ~ 1 昼） */
const SKYKF = [
  { h:0.0,  top:0x04070e, hor:0x0e1830, fog:0x070b14, fogD:0.00095, ambC:0x8aa0cc, ambI:0.52, sunC:0x9fb6e8, sunI:0.45, warmI:0.60, cloudC:0x18233f, cloudOp:0.42, cabE:0.70, day:0.00 },
  { h:5.2,  top:0x06101f, hor:0x163255, fog:0x0b1a2c, fogD:0.00092, ambC:0x8499c4, ambI:0.50, sunC:0x90a8d8, sunI:0.42, warmI:0.55, cloudC:0x223047, cloudOp:0.45, cabE:0.62, day:0.08 },
  { h:6.6,  top:0x355084, hor:0xff9e63, fog:0xddae84, fogD:0.00085, ambC:0xc7a98f, ambI:0.50, sunC:0xffb066, sunI:0.70, warmI:0.34, cloudC:0xffd6ab, cloudOp:0.60, cabE:0.34, day:0.50 },
  { h:9.0,  top:0x2f74c4, hor:0xcfe3f3, fog:0xc9e1f2, fogD:0.00055, ambC:0xd8e6ff, ambI:0.54, sunC:0xfff0cf, sunI:1.00, warmI:0.16, cloudC:0xffffff, cloudOp:0.82, cabE:0.16, day:0.92 },

  { h:16.5, top:0x3074c0, hor:0xc7dcef, fog:0xc6dff0, fogD:0.00055, ambC:0xdce8ff, ambI:0.54, sunC:0xffeccb, sunI:1.00, warmI:0.16, cloudC:0xfff4ec, cloudOp:0.82, cabE:0.16, day:0.92 },
  { h:18.2, top:0x2b3f6b, hor:0xff7a3e, fog:0xdc8f5e, fogD:0.00085, ambC:0xc99a82, ambI:0.50, sunC:0xff8038, sunI:0.70, warmI:0.40, cloudC:0xffb585, cloudOp:0.62, cabE:0.40, day:0.50 },
  { h:19.6, top:0x0a1430, hor:0x21385f, fog:0x0c1730, fogD:0.00092, ambC:0x7e93bf, ambI:0.50, sunC:0x7d93c8, sunI:0.50, warmI:0.55, cloudC:0x223047, cloudOp:0.46, cabE:0.60, day:0.12 },
  { h:21.0, top:0x05080f, hor:0x0f1a32, fog:0x080d17, fogD:0.00095, ambC:0x8aa0cc, ambI:0.52, sunC:0x9fb6e8, sunI:0.45, warmI:0.60, cloudC:0x18233f, cloudOp:0.42, cabE:0.70, day:0.00 },
];
SKYKF.push(Object.assign({}, SKYKF[0], { h: 24.0 }));   // 0↔24 衔接帧
for (const kf of SKYKF) {
  kf.topC = new THREE.Color(kf.top); kf.horC = new THREE.Color(kf.hor); kf.fogC = new THREE.Color(kf.fog);
  kf.ambCC = new THREE.Color(kf.ambC); kf.sunCC = new THREE.Color(kf.sunC); kf.cloudCC = new THREE.Color(kf.cloudC);
}
const matKeys = Object.keys(THEMES.day.mats);
const dayCol = {}, nightCol = {};
for (const k of matKeys) { dayCol[k] = new THREE.Color(THEMES.day.mats[k]); nightCol[k] = new THREE.Color(THEMES.night.mats[k]); }

const sd = new THREE.Vector3();
function sunDir(hour, out) {     // 单位日向量：6:00 正东地平、12:30 近天顶、18:00 正西、夜间没入地平之下
  const alt = (Math.PI / 2) * Math.sin((Math.PI * (hour - 6)) / 12);
  const azi = (Math.PI * (hour - 6)) / 12;
  const ca = Math.cos(alt);
  return out.set(ca * Math.cos(azi), Math.sin(alt), ca * Math.sin(azi));
}
function applyDaylight(hour) {
  let lo = SKYKF[0], hi = SKYKF[SKYKF.length - 1];
  for (let i = 0; i < SKYKF.length - 1; i++) {
    if (hour >= SKYKF[i].h && hour < SKYKF[i + 1].h) { lo = SKYKF[i]; hi = SKYKF[i + 1]; break; }
  }
  const f = clamp((hour - lo.h) / ((hi.h - lo.h) || 1), 0, 1);
  const L = (a, b) => a + (b - a) * f;

  scene.fog.color.copy(lo.fogC).lerp(hi.fogC, f);
  scene.background.copy(scene.fog.color);
  scene.fog.density = L(lo.fogD, hi.fogD);
  sky.skyU.topColor.value.copy(lo.topC).lerp(hi.topC, f);
  sky.skyU.bottomColor.value.copy(lo.horC).lerp(hi.horC, f);
  ambient.color.copy(lo.ambCC).lerp(hi.ambCC, f); ambient.intensity = L(lo.ambI, hi.ambI);
  sun.color.copy(lo.sunCC).lerp(hi.sunCC, f);     sun.intensity = L(lo.sunI, hi.sunI);
  warm.intensity = L(lo.warmI, hi.warmI);
  sky.cloudMat.color.copy(lo.cloudCC).lerp(hi.cloudCC, f); sky.cloudMat.opacity = L(lo.cloudOp, hi.cloudOp);
  const dayAmt = L(lo.day, hi.day);
  for (const k of matKeys) M[k].color.copy(nightCol[k]).lerp(dayCol[k], dayAmt);
  M.cab.emissiveIntensity = L(lo.cabE, hi.cabE);
  document.body.classList.toggle("day", dayAmt > 0.5);

  sunDir(hour, sd);
  // 平行光：维持太阳方位，但仰角钳到 ≥6°，避免太阳没入地平后阴影翻面
  const horiz = Math.hypot(sd.x, sd.z) || 1e-4;
  const altL = Math.max(Math.asin(clamp(sd.y, -1, 1)), 0.105), caL = Math.cos(altL);
  sun.position.set((sd.x / horiz) * caL * SUN_R, Math.sin(altL) * SUN_R, (sd.z / horiz) * caL * SUN_R);
  // 可见太阳/光晕落在真实日位（可没入地平），颜色随光照统一暖化
  const sunVis = smoothstep(-0.16, 0.04, sd.y);
  sky.sunBall.position.copy(sd).multiplyScalar(SUN_VIS_R);
  sky.sunGlow.position.copy(sky.sunBall.position);
  sky.sunBall.material.color.copy(sun.color); sky.sunGlow.material.color.copy(sun.color);
  sky.sunBall.material.transparent = true;
  sky.sunGlow.material.opacity = 0.9 * sunVis; sky.sunBall.material.opacity = sunVis;
  sky.sunBall.visible = sky.sunGlow.visible = sunVis > 0.01;
  // 月亮在太阳对侧；星空随入夜渐显
  const moonVis = smoothstep(0.06, -0.10, sd.y);
  sky.moon.position.copy(sd).multiplyScalar(-MOON_VIS_R);
  sky.moonGlow.position.copy(sky.moon.position);
  sky.moonGlow.material.opacity = 0.4 * moonVis;
  sky.moon.visible = sky.moonGlow.visible = moonVis > 0.01;
  const nightF = smoothstep(0.06, -0.12, sd.y);
  stars.material.transparent = true; stars.material.opacity = nightF; stars.visible = nightF > 0.01;
}

/* ------- 雷暴可视化：在 applyDaylight 之上按强度叠加 阴云压暗 + 雨幕 + 闪电 + 湿地面 ------- */
const STORM = {
  fog: new THREE.Color(0x2a3038), top: new THREE.Color(0x33404e), hor: new THREE.Color(0x4b5662),
  cloud: new THREE.Color(0x39424e), amb: new THREE.Color(0x8a93a0), flash: new THREE.Color(0xcdd6e3),
};
const wetKeys = ["ground", "runway", "taxi", "apron", "road", "pad"];
function applyStorm(dt) {
  const stormy = sims.smart.runways.B.closedUntil - sims.smart.t > 0;   // 跑道 02R 关闭 = 雷暴过境
  storm.intensity += ((stormy ? 1 : 0) - storm.intensity) * Math.min(1, dt * 0.7);   // 数秒平滑起落
  const k = storm.intensity;
  if (k < 0.01) {
    storm.rain.visible = false;
    if (storm.wet) { for (const key of wetKeys) M[key].roughness = 0.95; storm.wet = false; }
    return;
  }
  // 阴云压顶：压暗太阳/环境光、雨雾转浓转灰、天穹转灰、地面暖灯凸显
  sun.intensity *= (1 - 0.78 * k);
  ambient.intensity *= (1 - 0.22 * k);
  ambient.color.lerp(STORM.amb, 0.5 * k);
  scene.fog.density *= (1 + 3.2 * k);
  scene.fog.color.lerp(STORM.fog, 0.72 * k);
  sky.skyU.topColor.value.lerp(STORM.top, 0.72 * k);
  sky.skyU.bottomColor.value.lerp(STORM.hor, 0.66 * k);
  sky.cloudMat.color.lerp(STORM.cloud, 0.7 * k);
  sky.cloudMat.opacity = Math.min(1, sky.cloudMat.opacity + 0.4 * k);
  warm.intensity += 0.35 * k;
  // 湿地面：跑道/滑行道/停机坪 变光滑压暗 → 湿亮反光感
  for (const key of wetKeys) { M[key].roughness = 0.95 - 0.52 * k; M[key].color.multiplyScalar(1 - 0.3 * k); }
  storm.wet = true;
  // 闪电：强雷暴随机白闪、快速衰减，闪时全场骤亮（经 Bloom 炸开）
  storm.flashTimer -= dt;
  if (k > 0.45 && storm.flashTimer <= 0) { storm.flash = 1; storm.flashTimer = 2.2 + Math.random() * 5.5; }
  storm.flash = Math.max(0, storm.flash - dt * 6);
  const fl = storm.flash * k;
  if (fl > 0.001) {
    ambient.intensity += fl * 1.7; sun.intensity += fl * 0.9;
    scene.fog.color.lerp(STORM.flash, fl * 0.6);
    sky.skyU.topColor.value.lerp(STORM.flash, fl * 0.5); sky.skyU.bottomColor.value.lerp(STORM.flash, fl * 0.5);
  }
  scene.background.copy(scene.fog.color);
  // 雨幕下落（用真实时间，雨速与仿真倍速解耦）
  const arr = storm.rain.geometry.attributes.position.array;
  for (const d of storm.drops) {
    let y = arr[d.o + 1] - d.speed * dt;
    if (y < 0) y += storm.TOP;
    arr[d.o + 1] = y; arr[d.o + 4] = y + d.len;
  }
  storm.rain.geometry.attributes.position.needsUpdate = true;
  storm.rain.material.opacity = 0.5 * k;
  storm.rain.visible = true;
}

/* ------- 主循环 ------- */
/* 固定步长推进：仿真与渲染帧率解耦，同种子结果在任意机器/帧率下可复现，
   步长 < 0.5 仍能防止高倍速下航班「穿越」相位边界；不足一步的余量跨帧累计 */
const SIM_STEP = 0.1;
let last = performance.now(), uiTimer = 0, simAccum = 0;
const tmpV = new THREE.Vector3(0, 0, 0);
const label = $("label");

function loop(now) {
  requestAnimationFrame(loop);
  const realDt = Math.min((now - last) / 1000, .1);
  last = now;
  if (!paused) {
    simAccum += realDt * speed;
    let guard = 1000;   // 防御性上限：realDt≤.1、speed≤60 时每帧实际仅数十步
    while (simAccum >= SIM_STEP && guard-- > 0) {
      stepSim(sims.fcfs, SIM_STEP);
      stepSim(sims.smart, SIM_STEP);
      simAccum -= SIM_STEP;
    }
  }

  if (renderedView !== view) {
    renderedView = view;
    for (const m of planesGroup.children.slice()) planesGroup.remove(m);
    meshById = new Map();
  }
  const sim = sims[renderedView];
  applyDaylight(timeHour(((((sim.clockBase + sim.t) / 3600) % 24) + 24) % 24));
  applyStorm(realDt);
  updateCamera(realDt);
  contrails.update(realDt);

  for (const f of sim.flights) {
    if (f.phase === "departed") {
      const m = meshById.get(f.id);
      if (m) { planesGroup.remove(m); meshById.delete(f.id); }
      continue;
    }
    let m = meshById.get(f.id);
    if (!m) {
      m = buildPlaneMesh();
      m.userData.flightId = f.id;
      planesGroup.add(m); meshById.set(f.id, m);
    }
    m.position.copy(f.pos);
    const d = f.backward ? tmpV.copy(f.dir).negate() : f.dir;
    const targetYaw = Math.atan2(-d.z, d.x);
    let dy = targetYaw - m.rotation.y;
    while (dy > Math.PI) dy -= Math.PI * 2;
    while (dy < -Math.PI) dy += Math.PI * 2;
    m.rotation.y += dy * Math.min(1, realDt * 6);
    m.rotation.z = Math.atan2(d.y, Math.hypot(d.x, d.z)) * .8;
    const fxp = m.userData.fx;
    if (fxp) {
      const tt = now * 0.001, ph = f.phase;
      fxp.bT.visible = Math.sin(tt * 6.0 + f.id * 0.7) > 0.55;            // 防撞信标 机背/机腹异相慢闪
      fxp.bB.visible = Math.sin(tt * 6.0 + f.id * 0.7 + 1.1) > 0.70;
      const ts = (tt + f.id * 0.37) % 1.25;                              // 白色频闪 ~1.25s 双闪（按 id 错相）
      fxp.stL.visible = fxp.stR.visible = ts < 0.05 || (ts > 0.12 && ts < 0.17);
      fxp.land.visible = ph === "approach" || ph === "landing" || ph === "takeoff" || ph === "taxiIn" || ph === "taxiOut";  // 起降灯
      fxp.trail.visible = ph === "takeoff" && f.pos.y > 2;               // 机尾喷流（贴机，爬升中）
      fxp.ring.material.opacity = selectedId === f.id ? 0.5 + 0.3 * Math.sin(now * 0.005) : 0;
    }
    // 世界空间凝结尾迹：起飞爬升时沿航迹等距播撒消散气团（脱离飞机留在空中）
    if (f.phase === "takeoff" && f.pos.y > 6) {
      const last = m.userData.trailLast || (m.userData.trailLast = { x: f.pos.x, y: f.pos.y, z: f.pos.z });
      let dx = f.pos.x - last.x, dy = f.pos.y - last.y, dz = f.pos.z - last.z, dist = Math.hypot(dx, dy, dz), guard = 12;
      while (dist >= 3.5 && guard-- > 0) {
        const s = 3.5 / dist; last.x += dx * s; last.y += dy * s; last.z += dz * s;
        contrails.spawn(last.x, last.y - 0.3, last.z);
        dx = f.pos.x - last.x; dy = f.pos.y - last.y; dz = f.pos.z - last.z; dist = Math.hypot(dx, dy, dz);
      }
    } else if (m.userData.trailLast) m.userData.trailLast = null;
  }

  for (const k of ["A","B"]) {
    const closed = sim.t < sim.runways[k].closedUntil;
    rwMats[k].color.setHex(closed ? 0xff3b30 : 0xfff2c4);
  }
  towerLight.material.color.setHex(Math.sin(now * .004) > 0 ? 0xff5347 : 0x551c19);

  for (const b of buses) {
    const u = b.userData;
    u.x += u.dir * u.speed * realDt;
    if (u.x > 178) u.x = -178;
    if (u.x < -178) u.x = 178;
    b.position.set(u.x, 0, u.z);
    b.rotation.y = u.dir > 0 ? 0 : Math.PI;
  }
  for (const p of people) {
    const u = p.userData;
    const ph = now * .001 * u.speed + u.phase;
    p.position.set(u.ax + Math.sin(ph) * u.amp, Math.abs(Math.sin(ph * 7)) * .07, u.az);
    p.rotation.y = Math.cos(ph) >= 0 ? 0 : Math.PI;
  }
  for (const c of sky.clouds.children) {
    c.position.x += c.userData.vx * realDt;
    if (c.position.x > 560) c.position.x = -560;
  }

  const sf = sim.flights.find((x) => x.id === selectedId && x.phase !== "departed");
  if (sf) {
    tmpV.copy(sf.pos); tmpV.y += 8; tmpV.project(camera);
    if (tmpV.z < 1) {
      label.style.display = "block";
      label.style.left = (tmpV.x * .5 + .5) * window.innerWidth + "px";
      label.style.top = (-tmpV.y * .5 + .5) * window.innerHeight + "px";
      label.textContent = sf.callsign;
    } else label.style.display = "none";
  } else label.style.display = "none";

  if (fxOk) {
    try { fx.render(); }
    catch (err) { console.error("[fx] 后期合成异常，已回退为直接渲染：", err); fxOk = false; renderer.setRenderTarget(null); }
  }
  if (!fxOk) renderer.render(scene, camera);

  uiTimer += realDt;
  if (uiTimer > .25) { uiTimer = 0; refreshUI(); }
}
requestAnimationFrame(loop);
</script>
</body>
</html>
