<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>AEROTWIN · 成都天府国际机场 TFU · 调度算法 A/B 影子仿真</title>
<style>
  :root {
    --bg: #070b14; --panel: rgba(11,16,28,.9); --border: #1c2740;
    --text: #dfe6f3; --dim: #7a8aa8; --accent: #ff5347;
    --green: #3ddc97; --amber: #ffb454; --blue: #5aa9ff;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--mono); color: var(--text); }
  #scene { position: absolute; inset: 0; touch-action: none; }
  #scene canvas { display: block; touch-action: none; }
  .panel { position: absolute; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; backdrop-filter: blur(8px); }
  button {
    background: transparent; color: var(--dim); border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 700;
  }
  button.on { background: var(--accent); color: #0a0c12; border-color: var(--accent); }
  button.on-blue { background: var(--blue); color: #0a0c12; border-color: var(--blue); }
  button.warn { border-color: var(--amber); color: var(--amber); }
  button.closed { border-color: var(--accent); color: var(--accent); animation: atPulse 1.2s infinite; }
  button:disabled { cursor: default; }
  @keyframes atPulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  #topbar { top: 14px; left: 14px; right: 14px; height: 52px; display: flex; align-items: center; gap: 12px; padding: 0 16px; z-index: 20; transition: transform .3s ease, opacity .3s ease; }
  #topbar.hidden { transform: translateY(-130%); opacity: 0; pointer-events: none; }
  #btnBar { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); z-index: 26; width: 50px; height: 20px; padding: 0; line-height: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 0 0 9px 9px; background: var(--panel); border: 1px solid var(--border); border-top: none; backdrop-filter: blur(8px); }
  .logo { font-weight: 900; font-size: 15px; letter-spacing: 2px; white-space: nowrap; }
  .logo b { color: var(--accent); }
  .logo small { color: var(--dim); font-size: 11px; margin-left: 10px; font-weight: 400; }
  #clock { margin-left: auto; font-size: 19px; font-weight: 700; letter-spacing: 2px; }
  .btn-group { display: flex; gap: 6px; }
  #topControls { display: flex; align-items: center; gap: 12px; }
  #btnMenu { display: none; font-size: 16px; }
  #flightPanel { top: 80px; left: 14px; width: 252px; bottom: 14px; display: flex; flex-direction: column; }
  #flightHeader { padding: 10px 14px; font-size: 11px; color: var(--dim); letter-spacing: 2px; border-bottom: 1px solid var(--border); }
  #flightHeader em { color: var(--amber); font-style: normal; }
  #flightList { overflow-y: auto; flex: 1; padding: 6px 8px; }
  #flightList::-webkit-scrollbar { width: 5px; }
  #flightList::-webkit-scrollbar-thumb { background: #26334f; border-radius: 3px; }
  .frow { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; }
  .frow.sel { background: rgba(255,83,71,.12); border-color: var(--accent); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .fcs { font-size: 12px; font-weight: 700; width: 62px; }
  .forig { font-size: 10px; color: var(--dim); width: 30px; }
  .fph { font-size: 10px; margin-left: auto; }
  #kpiPanel { top: 80px; right: 14px; width: 236px; padding: 14px; }
  .kpi-title { font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 8px; }
  .cmp-grid { display: grid; grid-template-columns: 1fr 52px 52px; gap: 4px; font-size: 11px; margin-bottom: 6px; align-items: center; }
  .cmp-grid .h { font-size: 10px; font-weight: 800; text-align: right; }
  .cmp-grid .v { text-align: right; font-weight: 700; }
  .cmp-grid .k { color: var(--dim); }
  .win { color: var(--green) !important; }
  .divider { border-top: 1px solid var(--border); margin: 8px 0; padding-top: 8px; }
  .rw-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
  .bar { height: 4px; background: #141d33; border-radius: 2px; margin-bottom: 8px; }
  .bar > div { height: 100%; border-radius: 2px; background: var(--blue); transition: width .4s; }
  #detail { display: none; }
  #detail .callsign { font-size: 14px; font-weight: 800; color: var(--accent); }
  #detail .sub { font-size: 11px; color: var(--dim); margin-bottom: 6px; }
  #logPanel { bottom: 14px; left: 280px; right: 264px; padding: 8px 14px; max-height: 110px; overflow: hidden; }
  #camPanel { bottom: 14px; right: 14px; width: 134px; padding: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  #camPanel .cam-h { width: 100%; font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 2px; }
  #camPanel button { flex: 1 1 calc(50% - 3px); padding: 5px 0; }
  #camPanel #btnFollow { flex: 1 1 100%; }
  #logTitle { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .ev { font-size: 11px; color: var(--dim); line-height: 1.6; }
  .ev:first-of-type { color: var(--text); }
  .ev b { color: var(--accent); margin-right: 8px; font-weight: 400; }
  #label {
    position: absolute; display: none; transform: translate(-50%, -130%); background: var(--accent);
    color: #0a0c12; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; pointer-events: none; z-index: 10;
  }
  body.day {
    --bg: #aedcf5; --panel: rgba(255,255,255,.88); --border: #b9cade;
    --text: #1d2c44; --dim: #5b6d8d;
  }
  body.day .bar { background: #d9e3f0; }
  body.day #flightList::-webkit-scrollbar-thumb { background: #b9c6da; }
  /* —— 可收展面板 —— */
  .pcollapse { position: absolute; top: 7px; right: 7px; z-index: 3; width: 24px; height: 24px; padding: 0; line-height: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .phead { padding-right: 26px; }
  #flightHeader.phead, #logTitle.phead { padding-right: 30px; }
  /* 收展用 max-height 过渡 + 溢出裁剪（可平滑动画；topbar 不参与，免裁掉抽屉）*/
  #flightPanel, #kpiPanel, #camPanel { overflow: hidden; }
  #flightPanel, #kpiPanel, #logPanel, #camPanel { transition: max-height .26s ease; }
  #flightPanel { max-height: 100vh; }
  #kpiPanel { max-height: 84vh; }
  #camPanel { max-height: 240px; }
  .panel.collapsed { max-height: 42px !important; overflow: hidden !important; }
  @media (prefers-reduced-motion: reduce) {

  }

  /* —— 平板 —— */
  @media (max-width: 1024px) {

    #logPanel { left: 230px; right: 168px; }
    #camPanel { width: 126px; }

  /* —— 手机：顶栏单行 + ☰ 抽屉菜单（高度固定可控）—— */
  @media (max-width: 760px) {
    .logo { font-size: 13px; letter-spacing: 1px; }
    .logo small { display: none; }
    #topbar { top: 8px; left: 8px; right: 8px; height: 50px; gap: 8px; padding: 0 12px; }
    #clock { font-size: 16px; }
    button { padding: 7px 11px; }
    #btnMenu { display: flex; align-items: center; justify-content: center; }
    #topControls {
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: stretch; gap: 8px; min-width: 196px;

    #topbar.menu-open #topControls { visibility: visible; opacity: 1; transform: none; }
    #topControls .btn-group { display: flex; gap: 6px; }
    #topControls .btn-group button { flex: 1; }
    #topControls > button { width: 100%; }
    #flightPanel { top: 70px; left: 8px; width: 44vw; max-width: 220px; max-height: 44vh; }
    #kpiPanel { top: 70px; right: 8px; width: 50vw; max-width: 232px; max-height: 56vh; overflow-y: auto; padding: 10px; }
    #logPanel { left: 8px; right: 8px; bottom: 8px; max-height: 72px; }
    #camPanel { right: 8px; bottom: 92px; width: 132px; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ============================================================
   AEROTWIN web · 渲染 / UI 层（three.js）
   仿真内核已抽离至 sim.js（浏览器/Node 通用、纯逻辑零依赖），此处取出其 API；
   内核单元测试见 test/sim.test.js（npm test）
   ============================================================ */
const {
  RWY, GATE_COUNT, gateX, GATE_Z, IN_TAXI_Z, OUT_TAXI_Z,
  PHASE_LABEL, PHASE_COLOR, createSim, stepSim, snapshotKpi, log,
} = AeroSim;

/* ============================================================
   渲染层（three.js）
   ============================================================ */
/* 程序化客舱舷窗带（emissiveMap）：一排暖光小窗，夜间发光 */
function windowTexture() {
  const W = 256, Hh = 32, cv = document.createElement("canvas"); cv.width = W; cv.height = Hh;
  const c = cv.getContext("2d");
  const n = 16, gap = W / n;
  for (let i = 0; i < n; i++) { c.fillStyle = "#ffe9b8"; c.fillRect(i * gap + gap * 0.30, Hh * 0.30, gap * 0.40, Hh * 0.40); }
  const t = new THREE.CanvasTexture(cv); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
}

/* 共享几何 / 材质：所有飞机同款，~40 架共用一套（省内存、降 GC；逐机差异仅选择环） */
const PLANE = {
  geo: {
    fus: new THREE.CylinderGeometry(.95, .85, 8.5, 12), nose: new THREE.ConeGeometry(.93, 2.2, 12),
    wing: new THREE.BoxGeometry(2.6, .22, 11), tailH: new THREE.BoxGeometry(1.6, .18, 4.2), fin: new THREE.BoxGeometry(1.7, 2.3, .22),
    pylon: new THREE.BoxGeometry(1.0, .5, .2), engine: new THREE.CylinderGeometry(.55, .5, 2.6, 12), inlet: new THREE.CircleGeometry(.42, 14),
    windscreen: new THREE.BoxGeometry(.7, .5, 1.0), cabin: new THREE.BoxGeometry(5.4, .34, .05),
    cheat: new THREE.BoxGeometry(6.6, .16, .03), spinner: new THREE.ConeGeometry(.17, .5, 10),
    dot: new THREE.SphereGeometry(.26, 8, 8), dotS: new THREE.SphereGeometry(.2, 6, 6), trail: new THREE.PlaneGeometry(1, 1),
  },
  mat: {
    body: new THREE.MeshStandardMaterial({ color: 0xd8dfeb, roughness: .45, metalness: .4 }),
    acc: new THREE.MeshStandardMaterial({ color: 0xff5347, roughness: .4, metalness: .3, emissive: 0xff5347, emissiveIntensity: .25 }),
    engine: new THREE.MeshStandardMaterial({ color: 0xb7bfce, roughness: .5, metalness: .55 }),
    inlet: new THREE.MeshBasicMaterial({ color: 0x10151f }),
    window: new THREE.MeshStandardMaterial({ color: 0x97a3b8, roughness: .35, metalness: .2, emissive: 0xffe9b8, emissiveMap: windowTexture(), emissiveIntensity: .5 }),
    cheat: new THREE.MeshStandardMaterial({ color: 0xcf2230, roughness: .45, metalness: .3 }),
    glass: new THREE.MeshStandardMaterial({ color: 0x0a0f18, roughness: .15, metalness: .6, emissive: 0x9fd8ff, emissiveIntensity: .2 }),
    navR: new THREE.MeshBasicMaterial({ color: 0xff2b2b }), navG: new THREE.MeshBasicMaterial({ color: 0x2bff6a }),
    navW: new THREE.MeshBasicMaterial({ color: 0xfff4e0 }), strobe: new THREE.MeshBasicMaterial({ color: 0xffffff }),
    landing: new THREE.MeshBasicMaterial({ color: 0xfff6e0 }), beacon: new THREE.MeshBasicMaterial({ color: 0xff3b30 }),
    trail: new THREE.MeshBasicMaterial({ map: softGlowTexture(), color: 0xdfeaff, transparent: true, opacity: .5, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide }),
  },
};
function buildPlaneMesh() {
  const G = PLANE.geo, Mt = PLANE.mat, g = new THREE.Group();
  const add = (geo, mat, x, y, z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x, y, z); g.add(m); return m; };
  add(G.fus, Mt.body, 0, 0, 0).rotation.z = -Math.PI / 2;
  add(G.nose, Mt.body, 5.3, 0, 0).rotation.z = -Math.PI / 2;
  add(G.wing, Mt.body, .2, -.2, 0); add(G.tailH, Mt.body, -4.1, .4, 0); add(G.fin, Mt.acc, -4.2, 1.4, 0);
  for (const z of [-3.0, 3.0]) {                 // 翼下双发 + 暗色进气口
    add(G.pylon, Mt.body, .7, -.5, z);
    add(G.engine, Mt.engine, 1.0, -.95, z).rotation.z = -Math.PI / 2;
    add(G.inlet, Mt.inlet, 2.32, -.95, z).rotation.y = Math.PI / 2;
    add(G.spinner, Mt.body, 2.55, -.95, z).rotation.z = -Math.PI / 2;   // 进气整流锥
  }
  add(G.windscreen, Mt.glass, 4.2, .55, 0);      // 驾驶舱风挡
  add(G.cabin, Mt.window, -.2, .35, -.96); add(G.cabin, Mt.window, -.2, .35, .96);   // 两侧客舱舷窗带
  add(G.cheat, Mt.cheat, -.2, .04, -.99); add(G.cheat, Mt.cheat, -.2, .04, .99);     // 川航红腰线涂装
  add(G.dotS, Mt.navR, .2, -.1, -5.5); add(G.dotS, Mt.navG, .2, -.1, 5.5); add(G.dotS, Mt.navW, -5.2, .3, 0);  // 航行灯 左红/右绿/尾白（常亮）
  const bT = add(G.dot, Mt.beacon, 0, 1.1, 0), bB = add(G.dotS, Mt.beacon, 0, -1.0, 0);                        // 防撞信标 机背/机腹
  const stL = add(G.dotS, Mt.strobe, .2, -.1, -5.7), stR = add(G.dotS, Mt.strobe, .2, -.1, 5.7);               // 白色频闪 翼尖
  stL.visible = stR.visible = false;
  const land = add(G.dot, Mt.landing, 2.0, -.8, 0); land.visible = false;                                      // 起降灯 前向白光
  const trail = new THREE.Group();               // 起飞尾流：交叉双面软光带，仅爬升显现
  for (let i = 0; i < 2; i++) {
    const tp = new THREE.Mesh(G.trail, Mt.trail); tp.scale.set(9, 1.7, 1); tp.position.x = -4.5;
    if (i) tp.rotation.x = Math.PI / 2; trail.add(tp);
  }
  trail.position.set(-5.0, -.15, 0); trail.visible = false; g.add(trail);
  const ring = new THREE.Mesh(new THREE.RingGeometry(6.5, 7.6, 32),     // 选择环：逐机独立材质，脉冲不影响他机
    new THREE.MeshBasicMaterial({ color: 0xff5347, transparent: true, opacity: 0, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.y = -.4; g.add(ring);
  g.traverse((o) => { if (o.isMesh && o.material.isMeshStandardMaterial) o.castShadow = true; });
  g.scale.setScalar(1.15);
  g.userData.fx = { bT, bB, stL, stR, land, trail, ring };
  return g;
}

/* 细腻噪点纹理：让大地有草地质感（颜色由主题着色） */
function groundTexture() {
  const cv = document.createElement("canvas"); cv.width = cv.height = 256;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#e8e8e8"; ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 7000; i++) {
    const v = 195 + Math.floor(Math.random() * 60);
    ctx.fillStyle = "rgb(" + v + "," + v + "," + v + ")";
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(36, 24);
  return tex;
}

/* 由灰度高度场（取红通道）程序化推导切线空间法线图 */
function normalMapFrom(ctx, S, str) {
  const src = ctx.getImageData(0, 0, S, S).data;
  const ncv = document.createElement("canvas"); ncv.width = ncv.height = S;
  const nctx = ncv.getContext("2d"), nimg = nctx.createImageData(S, S), nd = nimg.data;
  const H = (x, y) => src[((((y % S) + S) % S) * S + (((x % S) + S) % S)) * 4] / 255;
  for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
    const dx = (H(x - 1, y) - H(x + 1, y)) * str, dy = (H(x, y - 1) - H(x, y + 1)) * str;
    const il = 1 / Math.hypot(dx, dy, 1), o = (y * S + x) * 4;
    nd[o] = (dx * il * 0.5 + 0.5) * 255; nd[o + 1] = (dy * il * 0.5 + 0.5) * 255; nd[o + 2] = il * 255; nd[o + 3] = 255;
  }
  nctx.putImageData(nimg, 0, 0);
  const t = new THREE.CanvasTexture(ncv); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
}

/* 程序化沥青：浅灰底（乘进材质色）+ 细颗粒 + 偶发裂纹；附微起伏法线图 */
function pavementTexture(o) {
  o = o || {}; const S = 256;
  const cv = document.createElement("canvas"); cv.width = cv.height = S; const c = cv.getContext("2d");
  c.fillStyle = o.base || "#e2e2e2"; c.fillRect(0, 0, S, S);
  const img = c.getImageData(0, 0, S, S), d = img.data;
  for (let i = 0; i < d.length; i += 4) { const n = (Math.random() - 0.5) * (o.grain || 30); d[i] += n; d[i + 1] += n; d[i + 2] += n; }
  c.putImageData(img, 0, 0);
  c.strokeStyle = "rgba(0,0,0,.16)"; c.lineWidth = 1;
  for (let i = 0; i < (o.cracks || 12); i++) {
    c.beginPath(); let x = Math.random() * S, y = Math.random() * S; c.moveTo(x, y);
    for (let j = 0; j < 5; j++) { x += (Math.random() - .5) * 46; y += (Math.random() - .5) * 46; c.lineTo(x, y); }
    c.stroke();
  }
  const map = new THREE.CanvasTexture(cv); map.wrapS = map.wrapT = THREE.RepeatWrapping;
  return { map, normal: normalMapFrom(c, S, o.normalStr || 2.2) };
}

/* 程序化混凝土：浅底 + 伸缩缝网格 + 油渍；附法线图（缝隙凹陷） */
function concreteTexture() {
  const S = 256, cv = document.createElement("canvas"); cv.width = cv.height = S; const c = cv.getContext("2d");
  c.fillStyle = "#ececec"; c.fillRect(0, 0, S, S);
  const img = c.getImageData(0, 0, S, S), d = img.data;
  for (let i = 0; i < d.length; i += 4) { const n = (Math.random() - 0.5) * 20; d[i] += n; d[i + 1] += n; d[i + 2] += n; }
  c.putImageData(img, 0, 0);
  c.strokeStyle = "rgba(0,0,0,.30)"; c.lineWidth = 2.5;
  for (let i = 0; i <= 3; i++) { const p = i * S / 3 + 0.5; c.beginPath(); c.moveTo(p, 0); c.lineTo(p, S); c.moveTo(0, p); c.lineTo(S, p); c.stroke(); }
  for (let i = 0; i < 7; i++) { c.fillStyle = "rgba(0,0,0," + (0.04 + Math.random() * 0.06) + ")"; c.beginPath(); c.arc(Math.random() * S, Math.random() * S, 10 + Math.random() * 28, 0, 7); c.fill(); }
  const map = new THREE.CanvasTexture(cv); map.wrapS = map.wrapT = THREE.RepeatWrapping;
  return { map, normal: normalMapFrom(c, S, 3.0) };
}

/* 程序化轮胎痕：透明底 + 沿滑跑方向的成簇深色胶痕（铺在接地带） */
function tireMarkTexture() {

/* 太阳神鸟金饰：金沙遗址出土，成都市标 / 天府机场文化图腾
   —— 中心 12 道旋转齿芒（太阳），外圈 4 只逆时针环飞神鸟 */
function drawSunBird(ctx, gold) {
  // 中心太阳：12 道旋转火芒
  const r1 = 60, r2 = 116;
  ctx.fillStyle = gold;
  for (let i = 0; i < 12; i++) {
    ctx.save();
    ctx.rotate((i / 12) * Math.PI * 2);
    ctx.beginPath();
    ctx.moveTo(-12, -r1);
    ctx.quadraticCurveTo(10, -(r1 + r2) / 2, 14, -r2);
    ctx.quadraticCurveTo(0, -(r1 + r2) / 2, 12, -r1);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0, 0, r1 - 4, 0, Math.PI * 2); ctx.fill();
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath(); ctx.arc(0, 0, r1 - 26, 0, Math.PI * 2); ctx.fill();
  ctx.globalCompositeOperation = "source-over";
  // 外圈 4 只神鸟
  const rb = 168;
  for (let i = 0; i < 4; i++) {
    ctx.save();
    ctx.rotate((i / 4) * Math.PI * 2 + 0.35);
    ctx.translate(0, -rb);
    ctx.scale(0.82, 0.82);
    ctx.beginPath();
    ctx.moveTo(-60, 8);
    ctx.quadraticCurveTo(-18, -16, 32, -12);
    ctx.quadraticCurveTo(62, -10, 80, -28);
    ctx.quadraticCurveTo(88, -36, 96, -30);
    ctx.lineTo(106, -33);
    ctx.quadraticCurveTo(92, -22, 80, -16);
    ctx.quadraticCurveTo(58, 0, 28, 4);
    ctx.quadraticCurveTo(-12, 10, -42, 18);
    ctx.lineTo(-60, 28);
    ctx.quadraticCurveTo(-54, 14, -60, 8);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();      // 上扬的翅膀
    ctx.moveTo(-6, -8);
    ctx.quadraticCurveTo(-30, -52, -66, -56);
    ctx.quadraticCurveTo(-30, -28, -18, -2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}
function sunBirdTexture() {
  const S = 512, cv = document.createElement("canvas"); cv.width = cv.height = S;
  const ctx = cv.getContext("2d");
  ctx.translate(S / 2, S / 2);
  drawSunBird(ctx, "#ecc04e");
  return new THREE.CanvasTexture(cv);
}

/* 天府航站楼群：T1/T2 呈「神鸟展翅」V 形对称展开，
   中央 GTC 圆厅屋顶铺太阳神鸟金饰（与实景一致），塔台立于中轴 */
/* 玻璃幕墙：菲涅尔天空反射着色器 —— 掠射角映射天穹渐变（随昼夜/雷暴自动变），
   正视显玻璃本色；零渲染开销，靠共享 sky 颜色对象自动跟随，无需逐帧更新 uniform。 */
const CURTAIN_VERT =                       // cameraPosition 仅 three 顶点阶段内置 → 此处算视向并透传
  "varying vec3 vWN; varying vec3 vView;" +
  "void main(){ vec4 wp = modelMatrix * vec4(position,1.0);" +
  " vView = cameraPosition - wp.xyz; vWN = normalize(mat3(modelMatrix) * normal);" +
  " gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }";
const CURTAIN_FRAG =
  "uniform vec3 skyTop; uniform vec3 skyHor; uniform vec3 base; uniform float reflectivity; uniform float fpow;" +
  "uniform vec3 glow; uniform float glowAmt;" +
  "varying vec3 vWN; varying vec3 vView;" +
  "void main(){ vec3 V = normalize(vView); vec3 N = normalize(vWN);" +
  " float fres = pow(1.0 - max(dot(N, V), 0.0), fpow);" +
  " vec3 R = reflect(-V, N); float up = clamp(R.y * 0.5 + 0.5, 0.0, 1.0);" +
  " vec3 sky = mix(skyHor, skyTop, up);" +
  " float refl = clamp(mix(0.18, 1.0, fres) * reflectivity, 0.0, 1.0);" +
  " vec3 col = mix(base, sky, refl) + glow * glowAmt;" +    // 夜间室内暖光透出
  " gl_FragColor = vec4(col, 1.0); }";
function makeCurtain(base) {
  return new THREE.ShaderMaterial({
    uniforms: {
      skyTop: { value: new THREE.Color(0x3d8fd6) }, skyHor: { value: new THREE.Color(0xcfe9fb) },
      base: { value: new THREE.Color(base) }, reflectivity: { value: 0.85 }, fpow: { value: 3.0 },
      glow: { value: new THREE.Color(0xffd9a0) }, glowAmt: { value: 0 },
    },
    vertexShader: CURTAIN_VERT, fragmentShader: CURTAIN_FRAG,
  });
}

function buildTerminal(scene, M, birdTex) {

    body.position.set(sign * 75, 3.5, 4); g.add(body);

    glow.position.set(sign * 75, 4.2, -4); g.add(glow);
    // 波浪屋顶：翼根高、翼梢低，叠正弦起伏

}

/* ------- 天空：渐变穹顶 / 太阳月亮光晕 / 柔和云层 ------- */
function softGlowTexture() {
  const cv = document.createElement("canvas"); cv.width = cv.height = 128;
  const ctx = cv.getContext("2d");
  const g = ctx.createRadialGradient(64, 64, 6, 64, 64, 62);
  g.addColorStop(0, "rgba(255,255,255,.95)");
  g.addColorStop(.5, "rgba(255,255,255,.5)");
  g.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(cv);
}
function buildSky(scene) {
  /* 天顶→地平线双色渐变穹顶 */
  const skyU = {
    topColor: { value: new THREE.Color(0x3d8fd6) },
    bottomColor: { value: new THREE.Color(0xcfe9fb) },
    offset: { value: 20 }, exponent: { value: .65 },
  };
  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(1500, 24, 12),
    new THREE.ShaderMaterial({
      uniforms: skyU, side: THREE.BackSide, depthWrite: false, fog: false,
      vertexShader: "varying vec3 vWorldPosition; void main(){ vec4 wp=modelMatrix*vec4(position,1.); vWorldPosition=wp.xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }",
      fragmentShader: "uniform vec3 topColor; uniform vec3 bottomColor; uniform float offset; uniform float exponent; varying vec3 vWorldPosition; void main(){ float h=normalize(vWorldPosition+vec3(0.,offset,0.)).y; gl_FragColor=vec4(mix(bottomColor,topColor,pow(max(h,0.),exponent)),1.); }",
    })
  );
  dome.renderOrder = -1; scene.add(dome);

  const puff = softGlowTexture();
  const cloudMat = new THREE.SpriteMaterial({ map: puff, transparent: true, depthWrite: false, opacity: .85 });
  const clouds = new THREE.Group();
  for (let i = 0; i < 10; i++) {
    const c = new THREE.Group();
    const n = 5 + Math.floor(Math.random() * 4);
    for (let j = 0; j < n; j++) {
      const s = new THREE.Sprite(cloudMat);
      const sc = 22 + Math.random() * 26;
      s.scale.set(sc * (1.3 + Math.random() * .6), sc, 1);
      s.position.set((j - n / 2) * 14 + (Math.random() - .5) * 8, (Math.random() - .4) * 7, (Math.random() - .5) * 14);
      c.add(s);
    }
    c.position.set(-560 + Math.random() * 1120, 140 + Math.random() * 90, -500 + Math.random() * 620);
    c.userData.vx = 1 + Math.random() * 1.8;
    clouds.add(c);
  }
  scene.add(clouds);

  const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: puff, color: 0xffe2a0, transparent: true, depthWrite: false, opacity: .9 }));
  sunGlow.scale.set(190, 190, 1); sunGlow.position.set(340, 290, -560); scene.add(sunGlow);
  const sunBall = new THREE.Mesh(new THREE.SphereGeometry(17, 16, 16), new THREE.MeshBasicMaterial({ color: 0xfff6d8, fog: false }));
  sunBall.position.copy(sunGlow.position); scene.add(sunBall);

  const moonGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: puff, color: 0xbcd0f0, transparent: true, depthWrite: false, opacity: .35 }));
  moonGlow.scale.set(80, 80, 1); moonGlow.position.set(-320, 270, -540); scene.add(moonGlow);
  const moon = new THREE.Mesh(new THREE.SphereGeometry(13, 16, 16), new THREE.MeshBasicMaterial({ color: 0xe6edf9, fog: false }));
  moon.position.copy(moonGlow.position); scene.add(moon);

  // 天空类对象额外置于图层 1：供湿地面反射用的 CubeCamera 单独取景（不影响主相机）
  dome.layers.enable(1); clouds.traverse((o) => o.layers.enable(1));
  for (const o of [sunGlow, sunBall, moonGlow, moon]) o.layers.enable(1);
  return { skyU, clouds, cloudMat, sunBall, sunGlow, moon, moonGlow };
}

/* ------- 雷暴天气：雨幕（联动「⛈ 雷暴关闭 02R」按钮）------- */
function buildStorm(scene) {
  const N = 2600, RX = 360, RZ = 360, TOP = 230;
  const pos = new Float32Array(N * 6), drops = [];
  for (let i = 0; i < N; i++) {
    const x = (Math.random() * 2 - 1) * RX, z = (Math.random() * 2 - 1) * RZ;
    const y = Math.random() * TOP, len = 3 + Math.random() * 3, o = i * 6;
    pos[o] = x; pos[o + 1] = y; pos[o + 2] = z;
    pos[o + 3] = x + 0.7; pos[o + 4] = y + len; pos[o + 5] = z;   // 顶端略偏 → 风斜雨丝
    drops.push({ o, speed: 95 + Math.random() * 70, len });
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  const rain = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0xaec6ea, transparent: true, opacity: 0, depthWrite: false }));
  rain.position.set(0, 0, -60); rain.frustumCulled = false; rain.visible = false; scene.add(rain);
  return { rain, drops, TOP };
}

/* ------- 世界空间凝结尾迹：环形池化的消散气团（脱离飞机、留在空中渐隐扩散）------- */
function buildContrails(scene) {
  const tex = softGlowTexture(), N = 140, pool = [];
  for (let i = 0; i < N; i++) {
    const mat = new THREE.SpriteMaterial({ map: tex, color: 0xeef4ff, transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending });
    const sp = new THREE.Sprite(mat); sp.visible = false; scene.add(sp);
    pool.push({ sp, mat, life: 0, max: 1, base: 1 });
  }
  let idx = 0;
  return {
    spawn(x, y, z) {                 // 环形覆盖：超过 N 个则自然顶替最旧
      const p = pool[idx]; idx = (idx + 1) % N;
      p.sp.position.set(x, y, z); p.sp.visible = true;
      p.life = p.max = 2.6; p.base = 2.6 + Math.random() * 1.4;
      p.sp.scale.setScalar(p.base);
    },
    update(dt) {
      for (const p of pool) {
        if (p.life <= 0) continue;
        p.life -= dt;
        if (p.life <= 0) { p.sp.visible = false; p.mat.opacity = 0; continue; }
        const t = p.life / p.max;                    // 1→0
        p.mat.opacity = 0.45 * t;                    // 渐隐
        p.sp.scale.setScalar(p.base * (1 + (1 - t) * 2.0));  // 渐扩散
        p.sp.position.y += dt * 1.4;                 // 随热气缓缓上飘
      }
    },
  };
}

function buildApronLife(scene) {
  const mat = {
    bridge: new THREE.MeshStandardMaterial({ color: 0xc9d2de, roughness: .6, metalness: .2 }),
    dark: new THREE.MeshStandardMaterial({ color: 0x222b3a, roughness: .5, metalness: .3 }),
    tug: new THREE.MeshStandardMaterial({ color: 0xf2c14e, roughness: .5 }),
    cart: new THREE.MeshStandardMaterial({ color: 0x39435c, roughness: .75 }),
    truck: new THREE.MeshStandardMaterial({ color: 0xe6ebf2, roughness: .55 }),
    fuel: new THREE.MeshStandardMaterial({ color: 0x46506a, roughness: .6 }),
    hiviz: new THREE.MeshStandardMaterial({ color: 0xff8a3c, roughness: .8, emissive: 0xff6a00, emissiveIntensity: .12 }),
    head: new THREE.MeshStandardMaterial({ color: 0xe8c39e, roughness: .8 }),
    wheel: new THREE.MeshStandardMaterial({ color: 0x1b2028, roughness: .9 }),
    chock: new THREE.MeshStandardMaterial({ color: 0xe8b23a, roughness: .85 }),
    line: new THREE.MeshBasicMaterial({ color: 0xf2c14e }),
  };
  const wheelGeo = new THREE.CylinderGeometry(.34, .34, .34, 8);
  const headGeo = new THREE.SphereGeometry(.22, 6, 6), bodyGeo = new THREE.CylinderGeometry(.26, .32, 1.0, 6);
  const box = (parent, g, m, x, y, z) => { const o = new THREE.Mesh(g, m); o.position.set(x, y, z); parent.add(o); return o; };
  const bg = (w, h, d) => new THREE.BoxGeometry(w, h, d);
  const wheels4 = (parent, w, l) => { for (const sx of [-1, 1]) for (const sz of [-1, 1]) { const o = new THREE.Mesh(wheelGeo, mat.wheel); o.rotation.x = Math.PI / 2; o.position.set(sx * w, .34, sz * l); parent.add(o); } };
  const rigs = [];

  for (let i = 0; i < GATE_COUNT; i++) {
    const gx = gateX(i);
    // 机位引导线（滑入道 → 机位）+ 机位号
    const line = box(scene, new THREE.PlaneGeometry(.45, GATE_Z - IN_TAXI_Z), mat.line, gx, .045, (GATE_Z + IN_TAXI_Z) / 2);
    line.rotation.x = -Math.PI / 2;
    const num = box(scene, new THREE.PlaneGeometry(5, 5), new THREE.MeshBasicMaterial({ map: gateNumTexture(i + 1), transparent: true }), gx, .05, GATE_Z + 7);
    num.rotation.x = -Math.PI / 2; num.rotation.z = Math.PI;

    // 廊桥：航站楼旋转柱 → 伸缩通道 → 接机舱口的活动端
    const R = { x: gx, y: 3.0, z: 2 }, D = { x: gx - 2.0, z: -6.5 };
    const dx = D.x - R.x, dz = D.z - R.z, fullLen = Math.hypot(dx, dz);
    const bridge = new THREE.Group(); bridge.position.set(R.x, R.y, R.z); bridge.rotation.y = Math.atan2(dx, dz); scene.add(bridge);
    box(bridge, new THREE.CylinderGeometry(1.3, 1.3, 3.4, 12), mat.bridge, 0, 0, 0);
    const tunnel = box(bridge, bg(2.0, 2.2, 1), mat.bridge, 0, 0, 0);
    const tGlass = box(bridge, bg(2.06, 0.9, 1), mat.dark, 0, .45, 0);
    const cab = box(bridge, bg(2.6, 2.6, 1.8), mat.bridge, 0, -.3, 0);

    // 地服（停靠时显现）：行李拖车小火车 / 客梯餐车 / GPU 电源车 / 地勤 / 轮挡
    const gse = new THREE.Group(); gse.position.set(gx, 0, -10); gse.visible = false; scene.add(gse);  // 原点对齐机身中心
    // 行李拖车小火车：机尾正后方（远离机身，向 -z 拖出）
    const train = new THREE.Group(); train.position.set(0.6, 0, -7.8); gse.add(train);
    box(train, bg(1.5, 1.0, 1.4), mat.tug, 0, .7, 0); wheels4(train, .65, .5);
    for (let c = 1; c <= 2; c++) { box(train, bg(1.3, .8, 1.2), mat.cart, 0, .6, -c * 1.8); box(train, bg(1.4, .45, 1.3), mat.dark, 0, 1.05, -c * 1.8); }
    // 客梯/餐车：右翼尖外侧
    const truck = new THREE.Group(); truck.position.set(7.8, 0, -1); gse.add(truck);
    box(truck, bg(2.0, 1.3, 2.0), mat.truck, 0, .85, 0); box(truck, bg(1.5, 1.5, 1.7), mat.truck, 0, 1.9, .2); wheels4(truck, .85, .8);
    // 加油车：左翼尖外侧
    const fuel = new THREE.Group(); fuel.position.set(-7.9, 0, 0); gse.add(fuel);
    box(fuel, bg(2.2, 1.1, 1.6), mat.fuel, 0, .7, 0); box(fuel, bg(1.0, .9, 1.4), mat.dark, 0, 1.4, -.6); wheels4(fuel, .9, .7);
    box(gse, bg(1.1, .9, 1.5), mat.fuel, 3.2, .55, 5.5);   // GPU 电源车：机头右前
    // 地勤 + 轮挡（机头前方、低矮，不触机身）
    for (const [px, pz] of [[2.4, 4.0], [-2.6, 4.5]]) { const p = new THREE.Group(); box(p, bodyGeo, mat.hiviz, 0, .55, 0); box(p, headGeo, mat.head, 0, 1.25, 0); p.position.set(px, 0, pz); gse.add(p); }
    box(gse, bg(.5, .3, .3), mat.chock, 1.3, .18, 0);

    rigs.push({ tunnel, tGlass, cab, fullLen, gse, dock: 0, _occ: false });
  }

  const setDock = (r, d) => {                       // d=0 收回（仅短节），d=1 抵舱口
    const len = 1.0 + (r.fullLen - 2.3) * d, mid = 1.3 + len / 2, far = 1.3 + len;
    r.tunnel.scale.z = len; r.tunnel.position.z = mid;
    r.tGlass.scale.z = len; r.tGlass.position.z = mid;
    r.cab.position.z = far;
  };
  for (const r of rigs) setDock(r, 0);

  return {
    update(sim, dt) {
      for (const r of rigs) r._occ = false;
      for (const f of sim.flights) if (f.phase === "atGate" && f.gate) rigs[f.gate.i]._occ = true;
      for (const r of rigs) {
        r.dock += ((r._occ ? 1 : 0) - r.dock) * Math.min(1, dt * 1.5);
        setDock(r, r.dock);
        r.gse.visible = r.dock > 0.5;
      }
    },
  };
}

/* ------- 机坪 & 进近灯光：高杆泛光灯 / PAPI / 跑道标线 / 顺序闪灯（兔子灯）/ 风向袋 ------- */
function runwayNumTexture(name) {

function buildAirfieldLights(scene) {
  const matMark = new THREE.MeshBasicMaterial({ color: 0xe8eef6 });
  const matPole = new THREE.MeshStandardMaterial({ color: 0x3a4456, roughness: .7, metalness: .3 });
  const matLamp = new THREE.MeshBasicMaterial({ color: 0xfff0cf });
  const matWhite = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const matRed = new THREE.MeshBasicMaterial({ color: 0xff3b30 });
  const matFlash = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const flashers = [];
  const mark = (w, d, x, z) => { const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), matMark); m.rotation.x = -Math.PI / 2; m.position.set(x, .06, z); scene.add(m); };

  // 高杆泛光灯（机坪 / 航站楼周边）—— 灯头经 Bloom 夜间发光，又给平场加竖向层次
  for (const [x, z] of [[-140, -33], [-70, -33], [0, -33], [70, -33], [140, -33], [-150, 8], [150, 8]]) {
    const g = new THREE.Group(); g.position.set(x, 0, z);
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(.4, .55, 17, 8), matPole); pole.position.y = 8.5; g.add(pole);
    const headBar = new THREE.Mesh(new THREE.BoxGeometry(4.2, .8, 1.4), matPole); headBar.position.y = 17; g.add(headBar);
    for (const lx of [-1.4, 0, 1.4]) { const l = new THREE.Mesh(new THREE.SphereGeometry(.5, 8, 8), matLamp); l.position.set(lx, 16.7, .35); g.add(l); }
    scene.add(g);
  }

  // 每条跑道：阈值斑马线 + 跑道号 + 接地带 + PAPI + 顺序闪灯
  for (const k of ["A", "B"]) {
    const z = RWY[k].z, name = RWY[k].name;
    for (let s = -3; s <= 3; s++) if (s !== 0) mark(3.2, 0.9, -179, z + s * 1.4);              // 阈值"钢琴键"
    const num = new THREE.Mesh(new THREE.PlaneGeometry(10, 7), new THREE.MeshBasicMaterial({ map: runwayNumTexture(name), transparent: true }));
    num.rotation.x = -Math.PI / 2; num.rotation.z = -Math.PI / 2; num.position.set(-165, .07, z); scene.add(num);  // 跑道号
    for (const tx of [-150, -120]) { mark(7, 1.0, tx, z - 2.0); mark(7, 1.0, tx, z + 2.0); }     // 接地带 / 瞄准点
    for (let p = 0; p < 4; p++) { const l = new THREE.Mesh(new THREE.SphereGeometry(.5, 8, 8), p < 2 ? matWhite : matRed); l.position.set(-184, .6, z - 9 + p * 1.6); scene.add(l); }  // PAPI
    const row = [];
    for (let x = -262; x <= -192; x += 9) { const l = new THREE.Mesh(new THREE.SphereGeometry(.55, 8, 8), matFlash); l.position.set(x, .5, z); l.visible = false; scene.add(l); row.push(l); }
    flashers.push(row);
  }

  // 风向袋
  const sock = { x: -150, z: -110 };
  const sockPole = new THREE.Mesh(new THREE.CylinderGeometry(.25, .3, 9, 8), matPole); sockPole.position.set(sock.x, 4.5, sock.z); scene.add(sockPole);
  const sockPivot = new THREE.Group(); sockPivot.position.set(sock.x, 8.8, sock.z); scene.add(sockPivot);
  const sockMats = [new THREE.MeshBasicMaterial({ color: 0xff7a3c }), new THREE.MeshBasicMaterial({ color: 0xf2e9c0 })];
  for (let s = 0; s < 5; s++) {
    const r1 = Math.max(0.12, 0.85 - s * 0.13), r2 = Math.max(0.1, 0.85 - (s + 1) * 0.13);
    const seg = new THREE.Mesh(new THREE.CylinderGeometry(r2, r1, 1.4, 10, 1, true), sockMats[s % 2]);
    seg.rotation.z = -Math.PI / 2; seg.position.x = 0.7 + s * 1.4; sockPivot.add(seg);
  }

  let t = 0;
  return {
    update(dt, stormK) {
      t += dt;
      for (const row of flashers) {                       // 兔子灯：脉冲自远向阈值奔跑
        const n = row.length, head = ((t / 0.6) % 1) * (n + 4) - 2;
        for (let i = 0; i < n; i++) row[i].visible = Math.abs(i - head) < 1.2;
      }
      const wind = Math.min(1, 0.45 + stormK * 0.6);        // 风向袋：常风半垂，雷暴吹挺并抖动
      sockPivot.rotation.y = 0.7 + Math.sin(t * 0.4) * 0.22;
      sockPivot.rotation.z = -1.05 * (1 - wind) - Math.abs(Math.sin(t * (2.2 + stormK * 5))) * 0.12 * wind - 0.05;
    },
  };
}

  let t = 0;
  return {
    update(dt, dayF) {

      heli.rotation.y = -hs.ang;
      rotor.rotation.y += dt * 22; trotor.rotation.x += dt * 30;
      beacon.visible = Math.sin(t * 6) > .3;
    },
  };

const ray = new THREE.Raycaster();

  const rect = renderer.domElement.getBoundingClientRect();

  ray.setFromCamera(m, camera);

  selectedId = id;
}
const ptrs = new Map();
let movedDist = 0, maxPtrs = 0, pinchPrev = 0, lastX = 0, lastY = 0;
const pinchDist = () => { const a = [...ptrs.values()]; return Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); };
renderer.domElement.addEventListener("pointerdown", (e) => {
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (ptrs.size === 1) { movedDist = 0; lastX = e.clientX; lastY = e.clientY; }
  else if (ptrs.size === 2) pinchPrev = pinchDist();
});

  if (!ptrs.has(e.pointerId)) return;

    const d = pinchDist();
    if (pinchPrev > 0 && d > 0) { cam.r = Math.max(90, Math.min(950, cam.r * (pinchPrev / d))); camGoal.r = cam.r; applyCam(); }
    pinchPrev = d;

    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    movedDist += Math.abs(dx) + Math.abs(dy);
    cam.theta -= dx * .005;

    pinchPrev = 0; const r = [...ptrs.values()][0]; lastX = r.x; lastY = r.y;

/* ------- 昼夜循环：太阳随时钟划过天空（大气散射式渐变）-------

const matKeys = Object.keys(THEMES.day.mats);
const dayCol = {}, nightCol = {};

const sd = new THREE.Vector3();
function sunDir(hour, out) {     // 单位日向量：6:00 正东地平、12:30 近天顶、18:00 正西、夜间没入地平之下
  const alt = (Math.PI / 2) * Math.sin((Math.PI * (hour - 6)) / 12);
  const azi = (Math.PI * (hour - 6)) / 12;
  const ca = Math.cos(alt);
  return out.set(ca * Math.cos(azi), Math.sin(alt), ca * Math.sin(azi));
}
function applyDaylight(hour) {
  let lo = SKYKF[0], hi = SKYKF[SKYKF.length - 1];
  for (let i = 0; i < SKYKF.length - 1; i++) {
    if (hour >= SKYKF[i].h && hour < SKYKF[i + 1].h) { lo = SKYKF[i]; hi = SKYKF[i + 1]; break; }
  }
  const f = clamp((hour - lo.h) / ((hi.h - lo.h) || 1), 0, 1);
  const L = (a, b) => a + (b - a) * f;

  scene.fog.color.copy(lo.fogC).lerp(hi.fogC, f);
  scene.background.copy(scene.fog.color);
  scene.fog.density = L(lo.fogD, hi.fogD);
  sky.skyU.topColor.value.copy(lo.topC).lerp(hi.topC, f);
  sky.skyU.bottomColor.value.copy(lo.horC).lerp(hi.horC, f);
  ambient.color.copy(lo.ambCC).lerp(hi.ambCC, f); ambient.intensity = L(lo.ambI, hi.ambI);
  sun.color.copy(lo.sunCC).lerp(hi.sunCC, f);     sun.intensity = L(lo.sunI, hi.sunI);
  warm.intensity = L(lo.warmI, hi.warmI);
  sky.cloudMat.color.copy(lo.cloudCC).lerp(hi.cloudCC, f); sky.cloudMat.opacity = L(lo.cloudOp, hi.cloudOp);

  sky.sunBall.material.color.copy(sun.color); sky.sunGlow.material.color.copy(sun.color);
  sky.sunBall.material.transparent = true;

  sky.moonGlow.position.copy(sky.moon.position);
  sky.moonGlow.material.opacity = 0.4 * moonVis;
  sky.moon.visible = sky.moonGlow.visible = moonVis > 0.01;
  const nightF = smoothstep(0.06, -0.12, sd.y);

  distant.winMat.emissiveIntensity = 0.04 + nightF * 1.1;   // 城市天际线夜间亮窗

}

/* 昼夜按钮：自动（跟随时钟）→ 固定白天 → 固定夜间 → 自动 */
let timeMode = "auto";
const timeHour = (clockHour) => timeMode === "auto" ? clockHour : (timeMode === "day" ? 12.5 : 0.5);
btnTheme.onclick = () => {
  timeMode = timeMode === "auto" ? "day" : (timeMode === "day" ? "night" : "auto");
  btnTheme.textContent = timeMode === "auto" ? "🕐 自动昼夜" : (timeMode === "day" ? "☀️ 固定白天" : "🌙 固定夜间");
};
btnTheme.textContent = "🕐 自动昼夜";
applyDaylight(6.0);

/* ------- 雷暴可视化：在 applyDaylight 之上按强度叠加 阴云压暗 + 雨幕 + 闪电 + 湿地面 ------- */
const STORM = {
  fog: new THREE.Color(0x2a3038), top: new THREE.Color(0x33404e), hor: new THREE.Color(0x4b5662),
  cloud: new THREE.Color(0x39424e), amb: new THREE.Color(0x8a93a0), flash: new THREE.Color(0xcdd6e3),
};
const wetKeys = ["ground", "runway", "taxi", "apron", "road", "pad"];
function applyStorm(dt) {
  const stormy = sims.smart.runways.B.closedUntil - sims.smart.t > 0;   // 跑道 02R 关闭 = 雷暴过境
  storm.intensity += ((stormy ? 1 : 0) - storm.intensity) * Math.min(1, dt * 0.7);   // 数秒平滑起落
  const k = storm.intensity;
  if (k < 0.01) {
    storm.rain.visible = false;
    if (storm.wet) { for (const key of wetKeys) { M[key].roughness = 0.95; M[key].metalness = 0; M[key].envMapIntensity = 0; } storm.wet = false; }
    return;
  }
  // 阴云压顶：压暗太阳/环境光、雨雾转浓转灰、天穹转灰、地面暖灯凸显
  sun.intensity *= (1 - 0.78 * k);
  ambient.intensity *= (1 - 0.22 * k);
  ambient.color.lerp(STORM.amb, 0.5 * k);
  scene.fog.density *= (1 + 3.2 * k);
  scene.fog.color.lerp(STORM.fog, 0.72 * k);
  sky.skyU.topColor.value.lerp(STORM.top, 0.72 * k);
  sky.skyU.bottomColor.value.lerp(STORM.hor, 0.66 * k);
  sky.cloudMat.color.lerp(STORM.cloud, 0.7 * k);
  sky.cloudMat.opacity = Math.min(1, sky.cloudMat.opacity + 0.4 * k);
  warm.intensity += 0.35 * k;
  // 湿地面：跑道/滑行道/停机坪 变光滑压暗 → 湿亮反光感
  for (const key of wetKeys) { M[key].roughness = 0.95 - 0.55 * k; M[key].metalness = 0.45 * k; M[key].envMapIntensity = 0.9 * k; M[key].color.multiplyScalar(1 - 0.3 * k); }
  storm.wet = true;
  // 闪电：强雷暴随机白闪、快速衰减，闪时全场骤亮（经 Bloom 炸开）
  storm.flashTimer -= dt;
  if (k > 0.45 && storm.flashTimer <= 0) { storm.flash = 1; storm.flashTimer = 2.2 + Math.random() * 5.5; }
  storm.flash = Math.max(0, storm.flash - dt * 6);
  const fl = storm.flash * k;
  if (fl > 0.001) {
    ambient.intensity += fl * 1.7; sun.intensity += fl * 0.9;
    scene.fog.color.lerp(STORM.flash, fl * 0.6);
    sky.skyU.topColor.value.lerp(STORM.flash, fl * 0.5); sky.skyU.bottomColor.value.lerp(STORM.flash, fl * 0.5);
  }
  scene.background.copy(scene.fog.color);
  // 雨幕下落（用真实时间，雨速与仿真倍速解耦）
  const arr = storm.rain.geometry.attributes.position.array;
  for (const d of storm.drops) {
    let y = arr[d.o + 1] - d.speed * dt;
    if (y < 0) y += storm.TOP;
    arr[d.o + 1] = y; arr[d.o + 4] = y + d.len;
  }
  storm.rain.geometry.attributes.position.needsUpdate = true;
  storm.rain.material.opacity = 0.5 * k;
  storm.rain.visible = true;
}
function setView(v) {
  view = v; selectedId = null;
  btnFcfs.className = v === "fcfs" ? "on-blue" : "";
  btnSmart.className = v === "smart" ? "on" : "";
}
btnFcfs.onclick = () => setView("fcfs");
btnSmart.onclick = () => setView("smart");
document.querySelectorAll("[data-speed]").forEach((b) => {
  b.onclick = () => {
    speed = +b.dataset.speed; paused = false; btnPause.textContent = "⏸";
    document.querySelectorAll("[data-speed]").forEach((x) => x.classList.toggle("on", x === b));
  };
});
btnPause.onclick = () => { paused = !paused; btnPause.textContent = paused ? "▶" : "⏸"; };
btnStorm.onclick = () => {
  for (const k of ["fcfs","smart"]) {
    sims[k].runways.B.closedUntil = sims[k].t + 300;
    log(sims[k], "⛈ 雷暴：跑道 02R 关闭 5 分钟");
  }
};
$("flightList").addEventListener("click", (e) => {
  const row = e.target.closest("[data-fid]");
  if (row) selectedId = +row.dataset.fid;
});

/* ------- 相机：预设机位 + 跟随运镜 ------- */
const btnFollow = $("btnFollow");
document.querySelectorAll("[data-view]").forEach((b) => { b.onclick = () => goView(b.dataset.view); });
btnFollow.onclick = () => {
  follow = !follow;
  if (follow) {   // 开跟随却无选中活动航班时，自动锁定最近一架
    const act = sims[renderedView].flights.filter((x) => x.phase !== "departed");
    if (!act.some((x) => x.id === selectedId) && act.length) selectedId = act[act.length - 1].id;
  }
  syncCamButtons();
};
function syncCamButtons() {
  document.querySelectorAll("[data-view]").forEach((b) => b.classList.toggle("on-blue", !follow && b.dataset.view === viewName));
  btnFollow.classList.toggle("on", follow);
}
syncCamButtons();

/* ------- 顶栏控制台：把手一键收起 / 展开整条控制栏 ------- */
const btnBar = $("btnBar");
btnBar.onclick = () => { btnBar.textContent = $("topbar").classList.toggle("hidden") ? "▾" : "▴"; };

/* ------- 顶栏抽屉菜单（手机）：☰ 开合，选完任一控件即收起 ------- */
$("btnMenu").onclick = () => $("topbar").classList.toggle("menu-open");
$("topControls").addEventListener("click", (e) => { if (e.target.closest("button")) $("topbar").classList.remove("menu-open"); });

/* ------- 面板收展（适配手机 / 平板）------- */
function setCollapsed(panel, on) {
  panel.classList.toggle("collapsed", on);
  const b = panel.querySelector(".pcollapse"); if (b) b.textContent = on ? "▸" : "▾";
}
document.querySelectorAll(".pcollapse").forEach((btn) => {
  btn.onclick = (e) => { e.stopPropagation(); const p = btn.closest(".panel"); setCollapsed(p, !p.classList.contains("collapsed")); };
});
/* 小屏默认收起较占地的航班列表与事件日志，腾出 3D 视野（KPI 与机位保留）*/
if (window.matchMedia("(max-width: 760px)").matches) {
  setCollapsed($("flightPanel"), true);
  setCollapsed($("logPanel"), true);
}

/* ------- UI 刷新（4Hz） ------- */
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
function refreshUI() {
  const sim = sims[view];
  const tt = sim.clockBase + sim.t;
  $("clock").textContent =
    String(Math.floor(tt / 3600) % 24).padStart(2, "0") + ":" +
    String(Math.floor((tt % 3600) / 60)).padStart(2, "0") + ":" +
    String(Math.floor(tt % 60)).padStart(2, "0");

  const kFcfs = snapshotKpi(sims.fcfs), kSmart = snapshotKpi(sims.smart);
  const k = view === "fcfs" ? kFcfs : kSmart;

  const active = sim.flights.filter((f) => f.phase !== "departed");
  $("flightHeader").innerHTML = (view === "fcfs" ? "FCFS" : "智能") + " 视图 · 活动 " + k.active +
    (k.holding ? "（<em>" + k.holding + " 盘旋</em>）" : "");
  $("flightList").innerHTML = active.slice(-60).reverse().map((f) =>
    '<div class="frow' + (selectedId === f.id ? " sel" : "") + '" data-fid="' + f.id + '">' +
    '<div class="dot" style="background:' + PHASE_COLOR[f.phase] + '"></div>' +
    '<div class="fcs">' + esc(f.callsign) + '</div>' +
    '<div class="forig">' + esc(f.origin) + '</div>' +
    '<div class="fph" style="color:' + PHASE_COLOR[f.phase] + '">' + PHASE_LABEL[f.phase] + '</div></div>'
  ).join("") || '<div style="color:var(--dim);font-size:11px;padding:12px">等待首班进港…</div>';

  const rows = [
    ["准点率", "onTime", "%", true], ["平均延误", "avgDelay", "s", false],
    ["平均滑入", "avgTaxi", "s", false], ["已离场", "departed", "", true],
    ["盘旋等待", "holding", "", false],
  ];
  $("cmpRows").innerHTML = rows.map((r) => {
    const a = kFcfs[r[1]], b = kSmart[r[1]];
    const bWin = r[3] ? b > a : b < a, aWin = r[3] ? a > b : a < b;
    return '<div class="cmp-grid"><span class="k">' + r[0] + '</span>' +
      '<span class="v' + (aWin ? " win" : "") + '">' + a + r[2] + '</span>' +
      '<span class="v' + (bWin ? " win" : "") + '">' + b + r[2] + '</span></div>';
  }).join("");

  $("utilTitle").textContent = "跑道占用率（" + (view === "fcfs" ? "FCFS" : "智能") + "）";
  $("rwRows").innerHTML = ["A","B"].map((kk) => {
    const rw = sim.runways[kk];
    const closed = sim.t < rw.closedUntil, busy = rw.occupiedBy !== null;
    const util = kk === "A" ? k.utilA : k.utilB;
    return '<div class="rw-row"><span>跑道 ' + RWY[kk].name +
      (closed ? ' <span style="color:var(--accent)">关闭' + (kk === "B" ? " " + Math.max(0, Math.round(rw.closedUntil - sim.t)) + "s" : "") + '</span>' :
        busy ? ' <span style="color:var(--amber)">占用</span>' : "") +
      '</span><span style="color:var(--dim)">' + util + '%</span></div>' +
      '<div class="bar"><div style="width:' + util + '%;background:' + (closed ? "var(--accent)" : "var(--blue)") + '"></div></div>';
  }).join("");

  const stormClosed = sims.smart.t < sims.smart.runways.B.closedUntil;
  btnStorm.disabled = stormClosed;
  btnStorm.className = stormClosed ? "closed" : "warn";
  btnStorm.textContent = stormClosed
    ? "02R 关闭 " + Math.max(0, Math.round(sims.smart.runways.B.closedUntil - sims.smart.t)) + "s"
    : "⛈ 雷暴关闭 02R";

  const det = $("detail");
  const sf = active.find((f) => f.id === selectedId);
  if (sf) {
    det.style.display = "block";
    det.querySelector(".callsign").textContent = sf.callsign;
    det.querySelector(".sub").textContent = sf.airline + " · " + sf.origin + " 来港";
    det.querySelector(".kv").innerHTML = [
      ["状态", PHASE_LABEL[sf.phase]], ["机位", sf.gate ? sf.gate.i + 1 : "—"],
      ["跑道", sf.rwy ? sf.rwy.name : (RWY[sf.outRwyKey] ? RWY[sf.outRwyKey].name : "—")],
      ["进近延误", Math.round(Math.max(0, sf.delay)) + "s"],
    ].map((p) => '<div class="rw-row"><span style="color:var(--dim)">' + p[0] + '</span><span>' + esc(p[1]) + '</span></div>').join("");
  } else det.style.display = "none";

  $("logTitle").textContent = "塔台事件（" + (view === "fcfs" ? "FCFS" : "智能") + "）· 拖拽旋转 / 滚轮·双指缩放 / 点选飞机";
  $("logBody").innerHTML = sim.events.slice(0, 5).map((e) =>
    '<div class="ev"><b>T+' + Math.round(e.t) + 's</b>' + esc(e.msg) + '</div>').join("");
}

/* ------- 主循环 ------- */
/* 固定步长推进：仿真与渲染帧率解耦，同种子结果在任意机器/帧率下可复现，
   步长 < 0.5 仍能防止高倍速下航班「穿越」相位边界；不足一步的余量跨帧累计 */
const SIM_STEP = 0.1;
let last = performance.now(), uiTimer = 0, simAccum = 0, frameN = 0;
const tmpV = new THREE.Vector3(0, 0, 0);
const sunProj = new THREE.Vector3();
const label = $("label");

function loop(now) {
  requestAnimationFrame(loop);
  const realDt = Math.min((now - last) / 1000, .1);
  last = now;
  if (!paused) {
    simAccum += realDt * speed;
    let guard = 1000;   // 防御性上限：realDt≤.1、speed≤60 时每帧实际仅数十步
    while (simAccum >= SIM_STEP && guard-- > 0) {
      stepSim(sims.fcfs, SIM_STEP);
      stepSim(sims.smart, SIM_STEP);
      simAccum -= SIM_STEP;
    }
  }

  if (renderedView !== view) {
    renderedView = view;
    for (const m of planesGroup.children.slice()) planesGroup.remove(m);
    meshById = new Map();
  }
  const sim = sims[renderedView];
  applyDaylight(timeHour(((((sim.clockBase + sim.t) / 3600) % 24) + 24) % 24));
  applyStorm(realDt);
  updateCamera(realDt);
  contrails.update(realDt);
  apron.update(sim, realDt);
  airfield.update(realDt, storm.intensity);
  distant.update(realDt);
  aerial.update(realDt, smoothstep(-0.05, 0.18, sd.y));
  if (fx && fx.setSun) {   // 太阳光柱：喂入太阳屏幕位置 + 可见性（在画面内且地平线之上）
    sunProj.copy(sky.sunBall.position).project(camera);
    fx.setSun(sunProj.x * 0.5 + 0.5, sunProj.y * 0.5 + 0.5, (sunProj.z < 1 && sd.y > 0.02) ? 1 : 0);
  }

  for (const f of sim.flights) {
    if (f.phase === "departed") {
      const m = meshById.get(f.id);
      if (m) { planesGroup.remove(m); meshById.delete(f.id); }
      continue;
    }
    let m = meshById.get(f.id);
    if (!m) {
      m = buildPlaneMesh();
      m.userData.flightId = f.id;
      planesGroup.add(m); meshById.set(f.id, m);
    }
    m.position.copy(f.pos);
    m.rotation.order = "YZX";   // 偏航(Y)→俯仰(Z)→滚转(X)，使坡度绕机身纵轴
    const d = f.backward ? tmpV.copy(f.dir).negate() : f.dir;
    const targetYaw = Math.atan2(-d.z, d.x);
    let dy = targetYaw - m.rotation.y;
    while (dy > Math.PI) dy -= Math.PI * 2;
    while (dy < -Math.PI) dy += Math.PI * 2;
    const yawStep = dy * Math.min(1, realDt * 6);
    m.rotation.y += yawStep;
    // 平滑俯仰：抬前轮 / 接地拉飘的渐变感（不再瞬切到爬升/下降角）
    const targetPitch = Math.atan2(d.y, Math.hypot(d.x, d.z)) * .85;
    m.rotation.z += (targetPitch - m.rotation.z) * Math.min(1, realDt * 3);
    // 转弯压坡度：仅空中（y>3）按偏航角速度倾侧，地面滑行保持机翼水平（BANK_SIGN 决定内/外侧，正负可调）
    const tgtBank = f.pos.y > 3 ? Math.max(-0.45, Math.min(0.45, (yawStep / Math.max(realDt, 1e-3)) * 1.6)) : 0;
    m.userData.bank = (m.userData.bank || 0) + (tgtBank - (m.userData.bank || 0)) * Math.min(1, realDt * 3);
    m.rotation.x = m.userData.bank;
    const fxp = m.userData.fx;
    if (fxp) {
      const tt = now * 0.001, ph = f.phase;
      fxp.bT.visible = Math.sin(tt * 6.0 + f.id * 0.7) > 0.55;            // 防撞信标 机背/机腹异相慢闪
      fxp.bB.visible = Math.sin(tt * 6.0 + f.id * 0.7 + 1.1) > 0.70;
      const ts = (tt + f.id * 0.37) % 1.25;                              // 白色频闪 ~1.25s 双闪（按 id 错相）
      fxp.stL.visible = fxp.stR.visible = ts < 0.05 || (ts > 0.12 && ts < 0.17);
      fxp.land.visible = ph === "approach" || ph === "landing" || ph === "takeoff" || ph === "taxiIn" || ph === "taxiOut";  // 起降灯
      fxp.trail.visible = ph === "takeoff" && f.pos.y > 2;               // 机尾喷流（贴机，爬升中）
      fxp.ring.material.opacity = selectedId === f.id ? 0.5 + 0.3 * Math.sin(now * 0.005) : 0;
    }
    // 世界空间凝结尾迹：起飞爬升时沿航迹等距播撒消散气团（脱离飞机留在空中）
    if (f.phase === "takeoff" && f.pos.y > 6) {
      const last = m.userData.trailLast || (m.userData.trailLast = { x: f.pos.x, y: f.pos.y, z: f.pos.z });
      let dx = f.pos.x - last.x, dy = f.pos.y - last.y, dz = f.pos.z - last.z, dist = Math.hypot(dx, dy, dz), guard = 12;
      while (dist >= 3.5 && guard-- > 0) {
        const s = 3.5 / dist; last.x += dx * s; last.y += dy * s; last.z += dz * s;
        contrails.spawn(last.x, last.y - 0.3, last.z);
        dx = f.pos.x - last.x; dy = f.pos.y - last.y; dz = f.pos.z - last.z; dist = Math.hypot(dx, dy, dz);
      }
    } else if (m.userData.trailLast) m.userData.trailLast = null;
  }

  for (const k of ["A","B"]) {
    const closed = sim.t < sim.runways[k].closedUntil;
    rwMats[k].color.setHex(closed ? 0xff3b30 : 0xfff2c4);
  }
  towerLight.material.color.setHex(Math.sin(now * .004) > 0 ? 0xff5347 : 0x551c19);

  for (const b of buses) {
    const u = b.userData;
    u.x += u.dir * u.speed * realDt;
    if (u.x > 178) u.x = -178;
    if (u.x < -178) u.x = 178;
    b.position.set(u.x, 0, u.z);
    b.rotation.y = u.dir > 0 ? 0 : Math.PI;
  }
  for (const p of people) {
    const u = p.userData;
    const ph = now * .001 * u.speed + u.phase;
    p.position.set(u.ax + Math.sin(ph) * u.amp, Math.abs(Math.sin(ph * 7)) * .07, u.az);
    p.rotation.y = Math.cos(ph) >= 0 ? 0 : Math.PI;
  }
  for (const c of sky.clouds.children) {
    c.position.x += c.userData.vx * realDt;
    if (c.position.x > 560) c.position.x = -560;
  }

  const sf = sim.flights.find((x) => x.id === selectedId && x.phase !== "departed");
  if (sf) {
    tmpV.copy(sf.pos); tmpV.y += 8; tmpV.project(camera);
    if (tmpV.z < 1) {
      label.style.display = "block";
      label.style.left = (tmpV.x * .5 + .5) * window.innerWidth + "px";
      label.style.top = (-tmpV.y * .5 + .5) * window.innerHeight + "px";
      label.textContent = sf.callsign;
    } else label.style.display = "none";
  } else label.style.display = "none";

  // 仅雨天、且每 8 帧刷新一次天空反射立方图（干燥零开销）
  if (storm.intensity > 0.03 && frameN++ % 8 === 0) wetEnvCam.update(renderer, scene);

  if (fxOk) {
    try { fx.render(); }
    catch (err) { console.error("[fx] 后期合成异常，已回退为直接渲染：", err); fxOk = false; renderer.setRenderTarget(null); }
  }
  if (!fxOk) renderer.render(scene, camera);

  uiTimer += realDt;
  if (uiTimer > .25) { uiTimer = 0; refreshUI(); }
}
requestAnimationFrame(loop);
</script>
</body>
</html>
